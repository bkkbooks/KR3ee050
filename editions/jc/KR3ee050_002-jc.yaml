寸會陰一名屏翳穴在前陰後陰之中間任督沖三脈所起督由會陰而行背任由會陰而行腹沖由會陰而行足灸三壯曲骨從會陰上行橫骨上毛際陷中動脈應手臍下五寸灸三壯七壯中極一名玉泉一名氣原從曲骨上行在臍下四寸灸三壯一云百壯關元一名大中極從中極上行在臍下三寸此穴當人身上下四旁之中灸七壯石門一曰命門一曰精露一曰丹田一曰利機從關元上行在臍下二寸灸五壯氣海從石門上行在臍下一寸五分宛宛中灸五壯孕婦忌陰交一名少關一名橫戶從氣海上行在臍下一寸灸五壯一云百壯神關一名氣舍從陰交上行當臍之中灸三壯水分從神關上行臍上一寸灸五壯下脘從水分上行臍上二寸灸五壯建里從下脘上行臍上三寸灸五壯中脘從建里上行臍上四寸灸七壯一云二七壯至百壯上脘從中脘上行臍上五寸灸五壯巨關從上脘上行在岐骨下二寸灸七壯鳩尾一名𩩲骭一名尾翳從巨關上行一寸禁灸一云灸三壯中庭從鳩尾上行一寸陷中灸五壯膻中從中庭上行一寸六分橫兩乳間陷中灸七壯玉堂一名玉英從膻中上行一寸六分陷中灸五壯紫宮從玉堂上行一寸六分陷中仰而取之灸五壯華蓋從紫宮上行一寸六分陷中灸五壯璇璣從華蓋上行一寸陷中仰而取之灸五壯天突一名玉戶從璇璣上行一寸在結喉下三寸宛宛中灸三壯廉泉一名本池一名舌本從天突上行在頷下結喉上中央舌本下仰而取之灸三壯承漿一名天池一名懸漿從廉泉上行在頤前下唇稜下陷中灸七壯督脈穴歌督脈行背之中行二十八穴始長強腰俞陽關入命門懸樞脊中中樞長筋縮至陽歸靈臺神道身柱陶道周大椎啞門連風府腦戶強間後頂排百會前頂通囟會上星神庭素髎對水溝兌端在唇上齦交上齒縫之內督脈二十八穴分寸長強一名氣之陰郄一名橛骨靈樞謂之窮骨亦名骨骶穴在脊骶骨端督脈之別起於長強者即繞纂後外合大陽循行尾閭間伏地取之灸三壯腰俞從長強貫脊上行二十一椎下灸五壯陽關穴在十六椎下灸三壯命門一名屬累穴在十四椎下灸三壯懸樞穴在十三椎下灸三壯脊中一名神宗一名脊俞穴在十一椎下禁灸中樞穴在十椎下禁灸筋縮穴在九椎下灸三壯至陽穴在七椎下灸三壯靈臺穴在六椎下灸三壯神道穴在五椎下灸五壯身柱穴在三椎下灸五壯陶道穴在一椎下灸五壯大椎一名百勞穴在一椎之上灸五壯啞門穴在頂後入髮際五分宛宛中仰頭取之禁灸風府一名舌本從啞門入髮際一寸大筋內宛宛中禁灸腦戶一名合顱從風府上行一寸五分枕骨上禁灸強間一名大羽從腦戶上行一寸五分灸五壯後頂從強間上行一寸五分灸五壯百會從後頂上行一寸五分直兩耳尖頂陷中灸五壯一曰頭頂不得過七壯前頂從百會前行一寸五分灸五壯囟會從前頂前行一寸五分灸五壯上星一名神堂從囟會前行一寸灸五壯神庭從上星至前髮際灸三壯素髎一名面王從前髮際上至鼻端準頭前後髮際合骨度共一尺二寸禁灸水溝一名人中穴在鼻下人中陷中灸三壯炷如大麥兌端穴在上唇端灸三壯炷如大麥齦交穴在唇內上齒縫中灸三壯衝脈穴歌衝脈俠臍起橫骨大氣四注盲俞同商石陰通幽門穴至胸散布任流行衝脈十一穴分寸橫骨穴在少腹下尖陰上大赫氣穴四海中注盲俞商曲石關陰都通谷幽門衝脈起於足陽明並於足少陰腹氣之街俠臍中行左右各五分通共十一穴每穴上行相去各一寸任督沖三脈皆起於胞中是三脈一源也帶脈穴歌帶起少陽帶脈穴繞行五樞維道間京門之下居髎上周回季脅束帶然帶脈三穴分寸帶脈穴在足少陽經季脅之下一寸八分五樞從帶脈穴下三寸維道從五樞下行過肝經之章門穴下五寸三分足少陰別脈入跟中上腨至膕中別走而合太陽上至腎之氣穴穴當十四椎內與足少陰衝脈會外與足少陽帶脈合而不與衝脈偕行出於季脅屬少陽帶脈穴陽蹺脈歌陽蹺脈起申僕陽居髎肩髃巨骨鄉臑俞地倉巨髎泣終於睛明一穴強陽蹺者謂足太陽經之別脈也陽蹺脈十一穴分才申脈穴在足太陽膀胱經足外踝下五分陷中僕參從申脈繞後跟骨下附陽從僕參又前斜足外踝上三寸居髎從附陽穴又與足少陽會於季脅軟骨端下八寸三分肩髃從居髎又與手陽明會於膊骨頭肩端上巨骨從肩髃上行肩尖上兩叉骨臑俞從巨骨又與手足太陽陽維會肩後大骨下胛上廉地倉從臑俞又與手足陽明會於夾口吻旁四分巨髎從地倉穴行於鼻孔旁八分承泣從巨髎又與任脈足陽明會於目下七分睛明從承泣又與足太陽足陽明陰蹺會於目內眥外一分禁灸陰蹺穴歌陰蹺起於然谷穴上行照海交信列三穴原本足少陰足之太陽睛明接陰蹺者足少陰之別脈也陰蹺脈三穴分寸然谷起於足少陰腎經足內踝前大骨下陷中照海從然谷循內踝之下一寸是穴交信從照海穴下循太谿穴又郄於足內踝之上二寸直行交信穴從交信上循陰股入陰而行上循胸裡入缺盆上出人迎之前入頄鼻旁屬目內眥外宛宛中睛明穴合於一陽陽蹺上行氣並相還則為濡目之用矣陽維脈歌陽維脈起穴金門陽臑天髎肩井深本神陽白並臨泣正營腦空風池巡風府啞門此二穴項後入發是其根陽維脈十三穴分寸金門穴即足太陽膀胱經之足外踝下一寸陽交從金門行於足少陽膽經足外踝上七寸臑俞與手足太陽及蹺脈會於肩後大骨下胛上廉天髎與手足少陽會於缺盆中上毖骨際肩井又會於肩上陷中陽白從肩井穴上頭與足少陽會於眉上一寸本神臨泣二穴從陽白上行於目上直入髮際正營從臨泣上行二寸腦空從正營循行枕骨下風池從腦空下行至耳後大筋外廉風府啞門二穴與督脈