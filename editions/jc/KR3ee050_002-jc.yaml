body:
  text: 卷之二十二經脈起止經始太陰而厥陰最後穴先中府而終則期門原夫肺脈胸中始生出腋下而行於少商絡食指而接手陽明大腸起自商陽終迎香於鼻外胃歷承泣而降尋厲兌於足經脾自足之隱白趨大包於腋下心由極泉而出注小指之少衝少腸兮起端於少澤維肩後上絡乎聽宮膀胱穴自睛明出至陰於足外腎以湧泉發脈通俞府於前胸心包起乳後之天池絡中衝於手中指三焦始名指之外側從關衝而絲竹空膽從童子髎穴連竅陰於足之四指肝因大敦而上至期門而復歸太陰以終肺經穴歌手太陰經十一穴中府雲門天府列俠白尺澤孔最存列缺經渠大淵涉魚際直出大指端內側少商如韭葉肺經十一穴分寸中府穴在任脈中行華蓋穴旁直開去六寸乳上三肋間陷中動脈應手仰而取之灸三壯五壯雲門穴在手陽明大腸經巨骨之下夾氣戶旁二寸去中行六寸陷中動脈應手舉臂取之灸五壯千金云灸五十壯天府從雲門穴下循臑內腋下三寸動脈陷中以鼻尖點脈取之此穴禁灸灸之令人氣逆俠白從天府穴下行肘中約紋上去五寸動脈中灸五壯尺澤從俠白穴下行肘中約紋上屈肘橫紋筋骨罅中動脈應手灸三壯五壯甄權云臂屈伸橫紋間筋骨罅中不宜灸孔最從尺澤穴下行腕前約紋上七寸上骨下骨間陷中灸五壯列缺從孔最穴循外側行腕後側上一寸五分以兩手交叉當食指末筋骨罅中從腕後別走陽明直出食指內廉出其端灸三壯經渠從列缺穴循行寸口陷中禁灸灸則傷人神明太淵從經渠穴內循手掌後陷中每日平旦寅時脈從此始故一難曰寸口者脈之大會灸三壯魚際從太淵穴上魚手太指本節後內側陷中散脈中白肉際灸三壯少商從魚際穴循行手大指內側之端去爪甲角如韭葉許白肉際宛宛中不宜灸甲乙經云灸一壯大腸經穴歌手陽明穴起商陽二間三間合谷藏陽谿偏歷歷溫溜下廉上廉三里長曲池肘髎越五里臂臑肩髃巨骨起天鼎扶突接禾髎終以迎香二十止大腸經二十穴分寸商陽一名絕陽穴在手食指內側端後去爪甲如韭葉許灸三壯二間一名間谷從商陽循食指本節前內側陷中灸三壯三間一名少谷從二間循食指本節前內側陷中灸三壯合谷一名虎口從三間循行手大指次指岐骨間陷中灸三壯陽谿一名中魁從合谷循行手腕中上側兩筋間陷中張大指次指取之灸三壯偏歷從陽谿上行手腕後上側三寸灸三壯溫溜一名逆注一名蛇頭從偏歷上行三寸手陽明郄灸三壯下廉從溫溜上行二寸五分輔銳肉分灸三壯上廉從下廉上行一寸曲池下三分灸五壯三里從上廉上行一寸銳肉之端按之肉起灸三壯曲池從手三里上行在肘外輔骨屈肘曲骨之中以手拱胸取之灸三壯肘髎從曲池上行在肘大骨外廉陷中與天井相併相去一寸四分灸三壯五里從肘髎循行肘上三寸向里大脈中央一云在天府下五寸灸三壯臂臑從五里上行四寸兩筋兩骨罅宛宛陷中伸臂平手取之灸三壯肩髃從臂臑上行膊骨頭肩端上兩骨罅處宛宛中舉臂取之有空灸三壯至七七壯巨骨從肩髎上行臂端兩叉骨間陷中灸三壯五壯天鼎從巨骨循頸缺盆上直行扶突下一寸灸三壯扶突從天鼎上直行曲頰下一寸人迎後一寸五分仰而取之灸三壯禾髎從扶突貫頰直鼻孔下水溝旁五分灸三壯此穴一名長頻迎香一名衝陽從禾髎上一寸鼻孔旁五分禁灸胃經穴歌四十五穴足陽明承泣四白巨髎經地倉大迎登頰車下關頭維對人迎水突氣舍連缺盆氣戶庫房屋翳尋膺窗乳中下乳根不容承滿出梁門關門太乙滑肉起天樞外陵大巨里水道歸來達氣街髀關伏兔走陰市梁邱犢鼻足三里上巨虛連條口底下巨虛下有豐隆解谿衝陽陷谷同內庭厲兌陽明穴大指次指之端終胃經四十五穴分寸承泣一名面髎一名氣鼷穴穴在目下七分目下胞陷中上直瞳子正視取之禁灸四白從承泣直下三分頰空骨內亦直瞳子取之禁灸甲乙經曰灸七壯巨髎從四白下行俠鼻孔旁八分亦直瞳子取之灸七壯地倉一名會維從巨髎下行俠口吻旁四分外許近下微有動脈灸七壯重者七七壯病左治右病右治左炷宜小如粗釵腳大迎一名髓孔從地倉行腮頷下前一寸三分骨陷中動脈灸三壯頰車一名機關一名齒牙從大迎行耳下曲頰端近前八分陷中側臥開口取之灸三壯或七壯至七七壯炷如小麥下關從頰車上行耳前動脈側臥合口有空取之灸三壯頭維從下關上行額角入髮際以督脈中行神庭穴旁開四寸半禁灸人迎一名天五會從頭維下行頸下俠結喉旁一寸五分大動脈應手伸頭取之禁灸水突一名水門從人迎下直行頸大筋前內貼氣喉灸三壯氣舍從水突下直行頸大筋前結喉下一寸許陷中貼骨尖上有缺處灸三壯缺盆一名天蓋從氣舍下行肩上橫骨陷中為五臟六腑之道灸三壯氣戶從缺盆下行巨骨下一寸旁開中行四寸陷中仰而取之灸三壯五壯庫房從氣戶下行一寸六分亦旁開中行四寸陷中仰而取之灸三壯五壯屋翳從庫房下行一寸六分亦旁開中行四寸陷中仰而取之灸五壯膺窗從屋翳下行一寸六分亦旁開中行四寸陷中仰而取之灸五壯乳中從膺窗下行當乳頭之中禁灸乳根從乳下行一寸六分亦旁開中行四寸陷中仰而取之灸三壯五壯不容從乳根行在第四肋端幽門旁一寸五分去中行二寸對巨闕灸五壯承滿從不容下一寸亦旁開中行二寸對上脘灸五壯梁門從承滿下一寸亦旁開中行二寸灸五壯關門從梁門下一寸亦旁開中行二寸對中脘灸五壯太乙從關門下一寸亦旁開中行二寸對下脘灸五壯滑肉門從太乙下一寸去中行二寸對水分灸五壯天樞一名長溪一名谷門從滑肉門下一寸俠臍旁二寸許陷中去肓腧一寸五分千金云魂魄之舍不可針孕婦不可灸久冷痛癖可灸百壯外陵從天樞下一寸去中行二寸對陰交灸五壯大巨一名腋門從外陵下一寸去中行二寸灸五壯水道從大巨下三寸去中行二寸灸五壯歸來從水道下二寸去中行二寸灸五壯氣街一名氣衝從歸來行在腿班中有肉核名鼠溪直上一寸動脈應手亦旁開中行二寸灸七壯炷如大麥髀關從氣街下行膝上一尺二寸許中行左右各三指按捺上有肉起如伏兔之狀故名伏兔在此肉起後交紋中灸三壯一云禁灸伏兔從髀關下行膝上六寸起肉間正跪坐而取之禁灸千金云狂邪鬼語灸百壯或五十壯陰市從伏兔下行三寸在伏兔之下陷中拜揖而取之禁灸梁邱從陰市下行一寸兩筋間灸三壯犢鼻從梁邱下行過膝蓋骨下胻骨上陷中俗名膝眼此處陷中兩旁有孔狀如牛鼻在外側者故名灸三壯足三里從犢鼻下行髀骨外側大筋內宛宛中坐而豎膝低跗取之千金云灸二百壯至五百壯本云灸三壯小兒忌灸上巨虛從足三里下行三寸兩筋骨陷中舉臂取之灸三壯條口從上巨虛下行二寸舉足取之灸三壯下巨虛從條口下行二寸兩筋骨陷中蹲地舉足取之灸三壯豐隆從下巨虛復斜向後上行在足外踝上八寸䯒骨外廉陷中灸三壯解谿從豐隆內循下足腕上中行陷中在衝陽後一寸五分灸三壯衝陽從解谿下行足跗上即腳面也高骨間動脈灸三壯陷谷從衝陽下行二寸至足大指之次指本節後陷中去內庭二寸灸三壯內庭從陷谷下至足大指之次指本節前岐骨外間陷中灸三壯厲兌從內庭下行足大指次指之端去爪甲如韭葉許灸一壯脾經穴歌足太陰脾由足拇隱白先從內側起大都太白歷公孫商邱直上三陰塢漏谷地機陰陵泉血海箕門衝門抵府舍腹結大橫上腹哀食竇天溪連胸鄉周榮大包盡二十一穴太陰全脾經二十一穴分寸隱白穴在足大指內側端後去爪甲角如韭葉許灸三壯大都從隱白行足大指內側次指末骨縫赤白肉際陷中灸三壯太白從大都行足大指後內側內踝前橫骨下赤白肉際陷中灸三壯公孫從太白上行足大指本節後一寸內踝前陷中灸三壯商邱從公孫上行內踝下微前陷中灸三壯三陰交從商邱上行內踝尖上三寸夾骨陷中灸三壯漏谷一名太陰絡從三陰交上行三寸夾骨陷中灸三壯地機一名脾舍從漏谷上行五寸在膝下五寸內側夾骨陷中灸五壯陰陵泉從地機上行膝下內側曲膝橫紋頭陷中灸三壯血海一名百蟲窠從陰陵泉上行在膝臏上一寸內廉白肉際陷中灸五壯箕門從血海上行在魚腹上越兩筋間陰股內廉動脈應手不禁重按灸三壯衝門一名慈宮眾箕門上行橫骨兩端約紋中動脈去腹中行旁開三寸半灸五壯府舍從衝門上行七分去腹中行亦旁開三寸半灸五壯腹結一名腹屈從府舍上行三寸去腹中行三寸半灸五壯大橫從腹結上行一寸三分去中行三寸半灸五壯腹哀從大橫上行三寸半在日月下一寸五分去中行三寸半灸五壯食竇從腹哀上行三寸或從乳上三肋間動脈應手處往下六寸四分去胸中行旁開六寸舉臂取之灸五壯天溪從食竇上行一寸六分去胸中行旁開六寸仰而取之灸五壯胸鄉從天溪上行一寸六分去胸中行旁開六寸仰而取之灸五壯周榮從胸鄉上行一寸六分去胸中行旁開六寸仰而取之灸五壯大包從周榮外斜下行過少陽膽經淵液穴下三寸至腋下六寸許出九肋間季脅端灸三壯心經穴歌手少陰心起極泉青靈少海靈道全通里陰郄神門下少府少衝小指邊心經九穴分寸極泉穴在腋下臂內筋間動脈引胸中灸七壯青靈從極泉下行至肘在肋上三寸伸肘舉臂取之灸三壯少海一名曲節從青靈下行肘內廉節後大骨外上去肘端五分肘內橫紋頭屈肘向頭取之灸三壯一云禁灸靈道從少海下行掌後一寸五分灸三壯通里從靈道下行五分循腕側外腕後一寸陷中灸三壯陰郄一名手少陰郄從通里內行五分掌後脈中去腕五分當小指之後灸三壯神門一名兌沖一名中都從陰郄行掌後銳骨端陷中灸三壯或七壯炷如小麥少府從神門行手小指本節末外側骨縫陷中灸三壯少衝從少府行小指內側端去爪甲如韭葉許灸一壯一日三壯小腸經穴歌手太陽經小腸穴少澤先於小指列前谷後谿腕骨間陽谷須同養老設支正小海上肩貞臑俞天宗乘風合曲垣肩外復肩中天窗循次上天容此經穴數一十九還有顴髎入聽宮小腸經十九穴分寸少澤穴在手小指外側端去爪甲角一分陷中一名小舌灸一壯前谷從少澤上行手小指外側本節前陷中灸三壯後谿從前谷上行手小指本節後外側橫紋尖上陷中仰手握拳取之灸三壯腕骨從後谿上行手掌外側腕前起骨下罅縫陷中灸三壯陽谷從腕骨上行手掌外側腕下銳骨下陷中灸三壯養老從陽谷上行手下銳骨上一空腕後一寸許陷中灸三壯支正從養老上行外廉四寸灸三壯小海從支正上行肘外大骨外去肘端五分陷中屈手向頭取之灸五壯七壯肩貞從小海上行肩曲髀骨下大骨旁兩骨解間肩端後陷中灸三壯臑俞從肩貞上行肩端臑上肩骨下髀骨上廉陷中舉臂取之灸三壯天宗從臑俞上行肩骨下陷中灸三壯秉風從天宗上行肩上小髃骨舉臂有空灸三壯曲垣從乘風上行肩中央曲胛陷中按之應手痛灸三壯肩外俞從曲垣上行肩胛上廉去脊旁開三寸陷中灸三壯肩中俞從肩外俞上行肩胛內廉去脊督脈之大椎穴旁開二寸陷中灸十壯天窗一名窗籠從肩中俞上行頸大筋前曲頰下動脈應手陷中灸三壯天容從天窗上行耳下曲頰後灸三壯顴髎一名兌骨從天容上行面頄骨下廉銳骨端陷中禁灸聽宮一名多所聞從顴髎上行耳中之珠大如赤小豆灸三壯膀胱經穴歌足太陽經六