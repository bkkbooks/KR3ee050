body:
  text: 卷之三症治本義夫症者症也取症於外以驗其中必心無疑似病無遁情乃可以云治也苟症有未明而漫為施治其能不誤人者寡矣所以古人立四診之法望以證其形色聞以證其音聲問其起居飲食而得所因切其脈象至息而知所病如此內外詳審皆有明證然後從而治之無不得心應手故夫醫之治病必若禹之治水疏之瀹之決之排之順水之性而無庸私智穿鑿為也凡人身之經隧行有常度一失其平則陰陽不和陰勝則陽病陽勝則陰病經義昭然有條不紊設診治者取證未確必至病在陰而反灸其陽病在陽而反灸其陰宜灸多者反與之少則火力不及而病不能除宜灸少者反與之多則火力太過而病反增劇更有禁灸之穴灸之損人尤不可不慎昔倉公論齊文王病引脈法曰年二十脈氣當趨三十當疾步四十當安坐五十當安臥六十以上氣當大堇文王年未滿二十方脈氣之趨也而徐之不應天道四時後聞醫灸之即篤此論病之過也故年二十是謂易質法不當砭灸砭灸至氣逐又言齊北宮司空命婦出於病意診其脈曰病氣疝客於膀胱難於前後溲而溺赤灸其足厥陰之脈左右各一所即不遺溺而溲清以是知灸有所宜亦有所不宜在施治者具有灼見方可為人決死生撥亂反正而不失為良醫然此事誠有未易言者天有四時過不及之氣地有東西南北寒熱燥濕之不同人有老幼少壯膏粱藜藿之迥異又有先富後貧先貴後賤所遇不遂所欲病機發於隱微治之者或同病異治或異病同治非生有靈敏之質何能盡見人之五臟癥結難經曰知一為下工知二為中工知三為上工上工者十全九中工者十全八下工者十全六由是觀之醫有脈證不明而能為人全治者乎無有也人所生病奇變百出有一病即有一名名不正則言不順言不順則事不成古之人所以見垣一方者無他焉明證善治而已矣十二經主病經文手太陰病肺脹滿膨膨而喘咳缺盆中痛甚則交兩手而瞀此為臂厥是主肺所生病者咳上氣喘渴煩心胸滿臑臂內前廉痛厥掌中熱氣盛有餘則肩背痛風寒汗出中風小便數而欠氣虛則肩背痛寒少氣不足以息溺色變手陽明大腸病則齒痛頸腫是主津液所生病者目黃口乾鼽衄喉痹肩前臑痛大指次指痛不用氣有餘則當脈所過者熱腫虛則寒慄不復足陽明胃病則洒洒振寒善呻數欠顏黑病至則惡人與火聞木聲則惕然而驚心欲動獨閉戶塞牖而處甚則欲上高而歌棄衣而走賁響腹脹是為骭厥是主血所生病者狂瘧溫淫汗出鼽衄口喎唇胗頸腫喉痹大腹水腫膝臏腫痛循膺乳氣街股伏兔骭外廉足跗上皆痛中指不用氣盛則身以前皆熱其有餘於胃則消穀善飢溺色黃氣不足則身以前皆寒慄胃中寒則脹滿足太陰脾病舌本強食則嘔胃脘痛腹脹善噫得後與氣則快然如衰身體皆重是主脾所生病者舌本痛體不能動搖食不下煩心心下急痛溏瘕泄水閉黃疸不能臥強立股膝內腫厥足大指不用手少陰心病嗌乾心痛渴而欲飲是為臂厥是主心所生病者目黃脅痛臑臂內後廉痛厥掌中熱痛手太陽小腸病嗌痛頷腫不可以顧肩似拔臑似折是主液所生病者耳聾目黃頰腫頸項肩臑肘臂外後廉痛足太陽膀胱病則沖頭痛目似脫項如拔脊痛腰似折髀不可以曲膕如結腨如裂是為踝厥是主筋所生病者痔瘧狂顛疾頭囟項痛目黃淚出鼽衄項背腰尻膕踹腳皆痛小指不用足少陰腎病飢不欲食麵如漆柴咳唾則有血喝喝而喘坐而欲起目𥉂𥉂如無所見心如懸若飢狀氣不足則善恐心惕惕如人將捕之是為骨厥是主腎所生病者口熱舌乾咽腫上氣嗌乾及痛煩心心痛黃疸腸癖脊股內後廉痛痿厥嗜臥足下熱而痛手厥陰心包絡病手心熱臂肘攣急腋腫甚則胸脅支滿心中憺憺大動面赤目黃喜笑不休是主脈所生病者煩心心痛掌中熱手少陽三焦病耳聾渾渾焞焞嗌腫喉痹是主氣所生病者汗出目銳眥痛頰腫耳後肩臑肘臂外皆痛小指次指不用足少陽膽病口苦善太息心脅痛不能轉側甚則面微有塵體無膏澤足外反熱是為陽厥是主骨所生病者頭痛頷痛目銳眥痛缺盆中腫痛脅下腫馬刀俠癭汗出振寒瘧胸脅肋髀膝外至脛絕骨外踝前及諸節皆痛足厥陰肝病腰痛不可以俯仰丈夫㿉疝婦人少腹腫甚則嗌乾面塵脫色是主肝所生病者胸滿嘔逆飧泄狐疝遺溺閉癃奇經八脈主病經文督脈主病實則脊強虛則頭重王叔和以為腰背強痛不得俯仰大人顛病小兒風癇尺寸中央三部皆浮且直上直下為強長之象故主外邪任脈主病男子內結七疝女子帶下瘕聚王叔和以為少腹繞臍引陰中痛又曰寸口脈丸丸主腹中有氣如指上搶心俯仰拘急緊細實長者中寒而氣結也衝脈主病靈樞曰衝脈血盛則滲灌皮膚生毫毛女子數脫血不營其口唇故髯須不生宦者去其宗筋傷其衝脈故須亦不生越人曰衝脈為病逆氣而裡急或作躁熱皆衝脈逆也王叔和曰衛督用事則十二經不復朝於寸口其人必恍惚狂癡陽蹺脈主病越人曰陰緩而陽急王叔和注云當從外踝以上急內踝以上緩又曰寸口前部左右彈者陽蹺也苦腰背痛顛癇僵仆惡風枯痿痹體強陰蹺主病越人曰陽緩而陰急王叔和注云當從內踝以上急外踝以上緩又曰寸口脈後部左右彈者陰蹺也苦顛癇寒熱皮膚淫痹少腹痛裡急腰及髖窌下連陰痛男子陰疝女人漏下帶脈主病越人曰腹滿腰溶溶如坐水中明堂曰女人少腹痛裡急瘛瘲月事不調赤白帶下陰維脈主病王叔和云苦顛癇僵仆失音肌肉皮癢汗出惡風身洗洗然也又曰陰維脈沉大而實主胸中痛脅下滿心痛脈如貫珠者男子脅下實腰中痛女陰中痛或有瘡陽維脈主病王叔和曰苦肌肉痹癢皮膚痛下部不仁汗出而寒顛仆羊鳴手足相引甚者不能言張潔古曰衛為陽主表陽維受邪為病在表故作寒熱營為陰主裡陰維受邪為病在裡故苦心痛陰陽相維則營衛和諧營衛不諧則悵然失志不能自收持矣傷寒脈證漢張仲景先師通內經精義抉其奧旨著傷寒論脈證詳明立法制方條分縷悉如太陽病發熱惡寒頭項痛腰脊強噁心拘急體痛骨節疼則知是太陽經表症標病也若加發熱煩渴小便不利則知是太陽腑病經傳裡症本病熱結膀胱也若或有汗惡風不惡寒則知是傷風而非傷寒也其脈浮緊有力為傷寒浮緩無力為傷風其要在脈靜為不傳脈躁盛為欲傳也傷風脈當浮緩而反緊盛者其證熱盛而煩手足皆溫則知是傷風而得傷寒脈躁盛為傳也傷寒脈當浮緊而反浮緩者其證不煩少熱四肢厥冷則知是傷寒元氣虛而得傷風脈也若或身熱惡寒頭疼而脈反沉則知是太陽得少陰脈也若無頭痛但有身熱惡寒而脈沉則知病還在少陰經也如陽明病身熱微惡寒頭額目痛鼻乾不眠則是陽明經表症標病也若皆身熱煩渴欲飲汗出惡熱則知是陽明傳裡證本病也若潮熱自汗譫語發渴不惡寒反惡熱揭去衣被揚手擲足或發癍黃狂亂大便燥實不通或手足乍溫乍冷腹滿硬痛喘急則知是正陽明胃腑傳裡本實病也其脈微洪為標洪數為本沉數為實也如少陽病頭角痛目眩胸脅痛耳聾寒熱嘔而口苦心下滿悶則知是少陽經病也其脈乃弦數焉如太陰病身體壯熱腹痛咽乾手足溫或自利不渴則知是陽經熱邪傳太陰經標病也若加燥渴腹滿身目黃小水赤大便燥實不通則知是太陰經傳本病也若初病起頭不疼口不渴身不熱怯寒手冷中脘腹滿痛吐瀉小便清白或嘔噦則知是太陰經直中本病也若初病起無熱不渴止有胸膈䐜脹滿面唇皆無光澤或嘔胸急痛手足冷自覺不舒快少情緒則知是太陰經飲食生冷傷於脾胃而為內傷寒也其脈沉緩為標沉實為本沉細直中也其內傷寒亦沉細焉如少陰病引衣蜷臥而惡寒或舌乾口燥譫語發渴大便不通則知是陽經熱邪傳少陰標病若或身熱面赤足冷脈沉則知是腎經自受夾陰傷寒標與本俱病也若加煩躁欲坐臥泥水中雖欲飲而不受面赤脈沉足冷則知是陰極發躁本病也若身熱面赤足冷煩躁欲飲揭去衣被脈數大無力則知是虛陽伏陰標與本病也若初病起頭不疼口不渴身不熱就便怕寒厥冷蜷臥或臍腹痛而吐瀉或戰慄面如刀刮則知是腎經直中本病也若無熱惡寒面色青小腹絞痛足冷脈沉蜷臥不渴或吐利甚則舌卷囊縮昏沉不省手足指甲皆青冷過肘膝心下脹滿湯藥不受則知是腎經夾陰中寒本病也若身面赤足冷脈沉身疼痛下利清穀則知是陰利寒證俗呼漏底者也其脈沉實有力為陽經熱邪傳入少陰標病也脈沉細無力為直中寒證數大無力為虛陽伏陰其夾陰傷寒陰極發躁脈皆沉也如厥陰病發熱惡寒似瘧狀則知是陽經熱邪傳入厥陰經標病也若煩滿囊縮消渴舌卷譫妄大便不通手足乍溫乍冷則是陽經熱邪傳入厥陰經本病也若初病起頭不疼口不渴身不熱就便怕寒四肢厥冷或小腹至陰疼痛或吐瀉體痛嘔噦涎沫甚則手足指甲面唇皆青冷過肘膝舌卷囊縮則知是厥陰經直中本病也其脈浮緩為標沉實有力為本微細無力或伏絕為直中也此六經之脈證有標有本臨症明辨學者宜盡心焉兩感張介賓曰病有兩感於寒者一日則太陽與少陰表裡俱病凡頭痛發熱惡寒者邪在表口乾而渴者邪在裡二日則陽明與太陰表裡俱病凡身熱目痛鼻乾不眠者邪在表腹滿不欲食者邪在裡三日則少陽與厥陰俱病幾耳聾脅痛寒熱而嘔者邪在表煩滿囊縮而厥水漿不入邪在裡凡兩感者或三日或六日營衛不行臟腑不通昏不知人胃氣乃盡故當死也拯救之計但當辨其緩急或解其外或和其中或因虛固本使元陽不敗孰先孰後臨症酌宜不可鑑言方治也兩感者本表裡之同病今見有少陰先潰於內而太陽繼之於外即縱情肆欲之兩感也太陰受傷於裡而陽明重感於表者即勞倦竭力飲食不調之兩感也厥陰氣逆於藏少陽復病於府者即七情不慎疲筋敗血之兩感也合病張介賓云合病者乃二陽三陽同病病之相合者也如初起發熱惡寒頭痛者此太陽之症而更兼不眠即太陽陽明合病也若兼嘔惡即太陽少陽合病若發熱不眠嘔惡者即陽明少陽合病也若三者俱全便是三陽合病其病同故必辨其脈證犯何逆然後得以法而治其逆也過經不解傷寒證以七日為一候仲景云太陽病頭痛至七日以上自愈者以行其經盡故也即內經七日太陽病衰頭痛少愈之旨也喻昌云過經不解者由七八日以後至十三日已後病過一候二候猶不痊解也然邪在身中日久勢必結聚於三陽太陽為多少陽次之陽明又次之及至三陰則生死反掌不若此之久持矣傷寒忌灸太陽病以火劫汗邪風被火熱血氣流溢失其常度兩陽相熏灼其身發黃云云太陽病二日反躁反熨其背而大汗出大熱人胃胃中水竭躁煩必發譫語云云太陽病以火熏之不得汗其人必躁到經不解必圍血名為火邪微數之脈慎不可灸脈浮宜以汗解用火灸之邪無從出因火而盛傷寒宜灸少陰病得之二三日口中和其背惡寒者當灸之常器之云足太陽鬲關二穴專灸背惡寒其背在第七椎下兩旁相去各三寸陷中正坐取之灸五壯少陰病吐利手足不厥冷反發熱者不死脈不至灸少陰七壯常器之云當灸少陰太谿二穴經曰腎之原出於太谿其穴在內踝後跟骨動脈陷中少陰病下利便膿血者可刺常器之云可刺足少陰幽門交信二處郭雍曰可灸考幽門二穴在鳩尾下一寸巨關兩旁各五分陷者中治瀉利膿血刺五分灸五壯交信二穴在內踝上二寸少陰前太陰後廉筋骨間治瀉利赤白刺四分留五呼灸三壯少陰病下利脈微澀嘔而汗出必數更衣反少者當溫其上灸之常器之云灸太衝郭雍云灸太谿此穴皆不治嘔而汗出裡急下利惟幽門主治乾噦嘔吐裡急下利亦當灸幽門為是傷寒六七日脈微手足厥冷而煩躁灸厥陰厥不還者死常器之云可灸太衝以太衝二穴為足厥陰之所注凡病診太衝脈可決人之生死其穴在足大指本節後二寸跗間陷者中動脈應手是其穴也灸三壯傷寒脈促厥逆者可灸之常器之云太衝穴前條手足厥逆灸太衝此條亦手足厥逆亦當灸太衝傷寒頭痛身熱灸二間合谷神道風池期門間使足三里傷寒汗不出目紅耳聾胸痛頷腫口禁灸俠谿復溜傷寒發熱煩躁口乾灸曲澤陰竅嘔吐氣逆曲澤手足逆冷大都遍身發熱百勞發狂百會間使復溜陰谷足三里陰症期門間使氣海關元聾啞天突期門間使耳聾腎俞偏歷聽會小便閉陰谷關元陰陵泉舌卷囊縮天突廉泉腎俞合谷復溜然谷血海腹脹大白復溜足三里餘熱曲池間使後谿婦人熱入血室期門中風症略經曰風為百病之長善入數變其中人也有中腑中臟真中類中之不同後之論治者有主痰主火主氣虛之各異要求其所自無不由中氣之虛外邪乃得乘其虛而襲之真中之症西北方風高往往有之故客於脈者則為厲風客於臟腑之俞則為偏風風氣循風腑而上則為腦風自腦戶而合於太陽則為目風飲酒汗出見風則為漏風入房汗出當風則為內風入於腸胃則為腸風外客腠理則為泄風其名不同其治亦異類中者狀如中風但無痛苦寒熱而肢節忽廢神氣言語倏忽失常此非外風所致乃肝邪風木所化戕賊中土故忽然卒倒昏不知人口眼歪僻痰涎上壅甚則口開心絕手撒脾絕目合肝絕遺尿腎絕聲如鼾睡肺絕五症全者死不治又見有吐沫直視面色如妝者肉脫筋痛者不治若非預防於平時而欲圖功於末路則幸而生全者良亦苦矣中風灸穴氣塞痰湧昏危不省人事百會風池大椎肩井間使曲池足三里肩髃環跳絕骨手足攣痹心神昏亂將有中風之候不論是風與氣可依次灸此則愈合谷風市崑崙手三里關元丹田卒中風神闕凡卒中風者此穴最佳羅天益雲中風服藥只可扶持要收全功灸火為良蓋不惟追散風邪宣通血脈其於回陽益氣之功真有莫能盡述者風癇前神聰去前頂五分自神庭至此穴共四寸灸三壯後神聰去百會一寸灸三壯口禁不開機關在耳下八分近前千金翼云凡中風口禁不開灸此二穴五壯即愈一云灸頰車承漿合谷偏風半身不遂左患灸右右患灸左肩髃肩井百會客主人承漿地倉三里三間二間陽陵泉陽輔口歪列缺風市曲池環跳足三里絕骨崑崙手足髓孔千金雲手髓孔在腕後尖骨頭宛宛中足髓孔在足外踝後一寸俱主治痿追風半身不遂灸百壯口眼喎斜頰車地倉水溝承漿聽會合谷凡口喎向右者是左脈中風而緩也宜灸左喎陷中二七壯喎向左者是右脈中風而緩也宜灸右喎陷中二七壯炷如麥粒喑啞天突靈道陰谷復溜豐隆然谷戴眼神庭脊骨三椎五椎各灸五七壯齊下火立效癱瘓肩髃合谷曲池環跳風市足三里絕骨陽陵泉崑崙肩井中渚陽輔角弓反張百會神門間使僕參命門風痹不仁天井尺澤少海陽輔中渚環跳太衝預防中風風池百會曲池合谷肩髃風市足三里絕骨環跳厥逆症略厥者四肢厥冷逆者氣血逆亂夫人厥則陽氣並於上陰氣並於下生氣通天論曰陽氣者煩勞則張精絕闢積於夏使人煎厥大怒則形氣絕而血菀於上使人薄厥大奇論曰脈至如喘名曰暴厥厥逆一症內經特重而詳言之如雲卒厥暴厥皆厥逆之總名也如雲寒厥熱厥分厥逆之陰陽也連經連臟論厥逆之生死也再若諸經臟腑之辨又極明顯後世又有氣厥血厥酒厥痰厥色厥食厥無非本之經義仲景傷寒論厥逆與內經有異臟厥蛔厥皆傷寒症也內經之厥重在元氣故熱厥當補陰寒厥當補陽傷寒之厥辨在邪氣故寒厥宜溫熱厥可攻也二者不可不察至若屍厥一症乃外邪卒中之惡候凡四時不正之氣及山魔土煞五屍魘魅之屬皆是也犯之者忽然手足厥冷肌膚寒慄面目青黑精神不守或口噤妄言痰涎壅塞或頭旋運倒不省人事即名飛屍卒厥宜用針法若用艾灸則莫如秦承祖灸鬼法及華陀救陽脫法為妙厥逆灸治厥冷逆氣海腎俞肝俞陽谿人中膻中百會一法以繩圍男左女右臂腕將繩從大椎向下度至脊中繩頭盡處是穴灸二十一壯屍厥灸此亦妙屍厥卒倒氣脫百會人中合谷間使氣海關元扁鵲治虢太子疾取三陽五會更熨兩脅下即蘇腎厥頭痛筋攣不嗜臥關元灸百壯卒忤肩井巨關水溝小炷三壯神門小炷三壯又灸中惡等症其穴在乳後三寸男左女右灸之陰厥脛直照海陽陵泉鬼魅狐惑鬼哭穴取將手兩大指相併縛定用艾炷於兩甲角反甲後肉四處騎縫著火灸之則患者哀告我自去為效面青腹痛嘔吐瀉利舌卷囊縮手指甲唇青心下結硬脹滿冷汗不止四體如冰厥逆昏沉不省人事脈伏絕者氣海穴在臍下一寸五分丹田穴在臍下二寸關元穴在臍下三寸用大艾炷灸二七壯得手足溫暖脈至知人事無汗要有汗出即生不暖不省脈不至者死中暑神昏症見卒倒無知名曰暑風大率有虛實兩途實者痰之實也平素積痰充滿經絡一旦感召盛暑痰阻其氣卒倒流涎此濕暍合病之最劇者也宜先吐其痰後清其暑猶易為也虛者陽之虛也平素陽氣衰微不振陰寒久已用事一旦感召盛暑邪湊其虛此濕暍病得自虛寒者也宜回陽藥中兼清其暑最難為也丹溪謂夏令火盛之時爍石流金何陰寒之有此其見偏主於熱治宜清涼灸法似不可用然亦不盡然也天有非時之氣人即有非時之病如夏行秋令冬行春令寒時得熱症熱時得寒症往往有之況盛暑之氣外陽而內陰中之者卒暴面垢冷汗出手足微冷或吐或瀉或喘或滿甚至不省人事宜灸百會中脘三里脾俞合谷人中陰谷三陰交冒暑霍亂百勞委中合谷曲池三里十宣首部症略人之有首猶山之有巔以其高出眾體之上為諸陽之總會也靈樞曰明堂者鼻也闕者眉間也庭者顏也蕃者頰側也蔽者耳門也又曰肺氣通於鼻心氣通於舌肝氣通於目脾氣通於口腎氣通於耳五臟不和則七竅不通故凡人之疾病吉凶無不上見於面觀其色之勝復生克即知其病之輕重淺深經曰赤色出顴大如拇指者病雖小愈必卒死黑色出於庭大如拇指必不病而卒死庭者南方火位黑乃北方水色水來剋火是陽神已離其所舍將何以固其生乎顴之左為肝顴之右為肺其骨屬腎病小愈而兩顴見赤色是為木火自焚水乾金鑠敗於內必形諸外知其卒死也必矣若滿面通紅氣盛者屬陽若兩顴鮮赤如指如縷而餘地不赤者陰虛也面色白者為氣虛白兼淡黃而氣不足者必失血面白色枯氣血俱敗面青兼白為陽虛陰勝面黃潤而微赤者濕熱面黃而兼青者此木邪犯土多不可治久病面轉黃蒼此欲愈也久病面色如煤不開者終不吉也面色青蒼者主疼痛平人面色如灰塵眼下青黑者必將有重病女人面色青者主肝強脾弱經絡不調女人顴頰鮮紅名帶桃花此陰中有虛火多淫而無子是皆病之不在面而色著於面也至若首之頭腦七竅各自見病逐一詳別而類匯之於後一頭痛內經所謂臟腑經脈之氣逆上亂於頭之清道致真氣不得運行壅遏經隧而痛者也如因風木痛者則抽掣惡風或有汗而痛因暑熱痛者或有汗或無汗則皆惡熱而痛因濕而痛者則頭重遇天陰尤甚因痰飲而痛者亦頭昏重憒憒欲吐因寒而痛絀急惡寒更有氣虛而痛者遇勞則甚其脈大有血虛而痛者善驚惕其脈芤診頭痛者審久暫明表裡因證而詳辨之不可執也仲景傷寒論則惟三陽有頭痛厥陰亦有頭痛而太少二陰則無之其痛亦各有所主太陽在後陽明在前少陽在側厥陰之脈會於巔則巔頂痛此又外感之所當辨者至若內傷則足六經及手少陰少陽皆有之又不得以三陽為拘矣東垣壯歲病頭痛每發時兩顴盡黃眩運目不欲開懶於言語身體沉重兀兀欲吐數日方過潔古老人曰此厥陰太陰合而為病名曰風痰為之灸俠谿二穴各二七壯不旬日愈一頭風眩運偏頭痛素問所言頭疼巔疾下虛上實過在足少陰巨陽甚則入腎徇蒙招尤目眩耳聾下實上虛過在足少陽厥陰甚則入肝下虛者腎虛也故腎虛則頭痛上虛者肝虛也故肝虛則頭暈徇蒙者如以物蒙其首招搖不定目眩耳聾皆暈之狀也風氣循風府而上則為腦風新沐中風為首風頭半邊痛鼻塞不聞香臭常流清涕時作臭氣謂之偏頭風左屬風又為血虛右屬痰又為熱若頭痛起核塊聲如雷鳴則謂之雷頭風頭腫大如斗則謂之大頭風是天行時疫也陽明受邪首面大腫也又天門真痛上引泥丸謂之真頭痛死不治若心肝壅熱上攻目睛則頭目皆痛胸膈風痰上攻者亦然一眼目有五輪八廓之別五輪應五行金精結為氣輪木精結為風輪火精結為血輪土精結為肉輪水精結為水輪入廓應八卦乾居西北絡通大腸之府故曰傳道廓坎正北方絡通膀胱之府故曰津液廓艮位東北絡通上焦之府故曰會陰廓震正東方絡通膽府故曰清淨廓巽位東南絡通中焦之府故曰養化廓離正南方絡通小腸之府故曰胞陽廓坤位西南絡通胃府故曰水穀廓兌正西方絡通下焦之府故曰關泉廓此由臟府配合與內經相發明也邪中於項因逢其身之虛其入深則隨眼系以入於腦入於腦則腦轉腦轉則引目系急目系急則目眩以轉矣脈度篇曰蹺脈氣不榮則目不合決氣篇曰氣脫者目不明又言目痛者白眼赤脈法於陽瞳子黑眼法於陰風熱上攻為陽症見紅腫重生翳膜精氣內損為陰症目昏澀眩運甚成內障若青盲又與內障有異並無紅腫赤痛翳膜等症而但視不見物是乃六腑幽邃之源郁遏靈明不得發露失神膽澀病也人見其目如平人珠青如故只自有目如無目耳故曰青盲又迎風赤爛眼症見風則赤爛無風則否與風弦赤爛入脾絡之深者不同凡治目灸法景岳載取諸穴最良一耳聾症有因諸經之火壅塞清道有因恚怒憂鬱肝膽氣逆有因風寒外感亂其營衛有因驚損竅閉或患聤耳潰膿不止而壞其竅者有因年哀或病後或勞倦過度者辨其在經在臟暴聾久聾在經暴聾者易治在臟久聾者難治一鼻為肺竅若七情內郁六淫外侵或飲食勞倦則肺氣不宣通清道壅塞而為病矣故鼻中肉贅臭不可近痛不可搖是為痔瘜由陽明執滯留結而然經曰膽移熱於腦則辛頞鼻淵鼻淵者濁涕下不止也故又名腦漏治之宜早久則難愈一齒牙病上牙屬足陽明下牙屬手陽明牙痛者濕熱蓄於腸胃而上壅於經蟲痛者由肥甘濕熱化生牙蟲以致蝕損蛀空牙敗而痛腎虛牙痛者其病不在經而在臟所謂腎衰則齒豁精固則齒堅是也又牙縫出血不止固屬胃火然亦有陰虛於下格陽於上誤作火治必至不救一頰唇病頰屬手足少陽三焦膽手太陽小腸足陽明胃又屬足厥陰肝頰因風落少陽病也人有欠伸頰車蹉脫口開不能合醉以酒乘睡以皂角末搐鼻嚏透則正唇病屬脾燥則乾熱則裂風則瞤寒則揭唇有緩縱下垂者脾下也脾氣不能振舉故下緩不休一咽喉喉主納氣氣從金化變動為燥燥則澀澀則閉塞而不仁故在喉謂之痹咽主納食從土化變動為濕濕則泥泥則壅脹而不通故在咽謂之腫痹者喉中不通言語不出而天氣閉塞也腫痛者不能納唾與食而地氣閉塞也喉癬多虛火遊行無制陰氣大虛陽氣飛越虛損人見此為海枯津竭甚為危侯一舌病靈樞曰足太陰是動則病舌本強孫景思云舌者心氣之所主脾脈之所通二臟不和風邪中之則舌強不能言壅熱攻之則舌不能轉傷寒熱毒攻心與傷寒病後失於調攝則舌縱不收又曰舌者聲音之機也人有風寒外感火鬱於內而氣閉失音者有氣血內虧水乾金燥而久嗽音啞者暫病失音易治久病致喑難治若夫叫號歌哭熱極飲冷或暴吸風寒則又當別論一頭項強痛經云諸痙項強皆屬於濕又足少陽之脈從耳後入耳中其支者加頰車下頸合缺盆手三陽脈俱與耳頰相通故頸強頰腫引耳痛多由邪客三陽經絡頸漏者頸上有孔或腫或不腫或痛或不痛時流水或膿血是有虛寒有邪熱當與瘰癧參治首部症治頭痛百會囟會丹田氣海上星神庭曲差後頂率谷風池上穴擇灸一穴即可愈偏頭痛風門通里列缺腦空頭風眩暈久痛不愈陽谿豐隆解谿髮際穴在肩上三寸灸三壯偏正頭疼腦空風池列缺大淵合谷解谿頭面腫陷谷厲兌目眩不能閉腦空解谿通里地倉頭目痛外關後谿目痛紅腫不明合谷二間肝俞足三里目昏生翳角孫足三里青盲眼肝俞膽俞腎俞養老商陽光明風爛眼肝俞膽俞腎俞絕谷光明耳聾腎俞竅陰上星風聾二七壯翳風痛聾七壯聽宮外關偏歷合谷陽維穴在耳後引耳令前弦上是穴千金治耳風雷鳴灸五十壯耳暴聾液門足三里聤耳聽宮頰車合谷鼻瘜鼻痔上星流清濁涕囟會百會風池人中大椎通天左鼻灸右右鼻灸左左右病俱灸灸後當去一塊形如朽骨其痹自愈灸炷如小麥大七壯鼻淵上星曲差風門合谷鼻塞囟會上星風門囟會一穴自七壯至七七壯灸至四日漸退七日愈口齒疳蝕生瘡承漿齒牙痛承漿頰車耳垂下盡骨上是穴三壯如神肩髃隨左右灸之列缺七壯立止三里大淵風牙痛魚際申脈二間陽谷上牙痛合谷陽谿液門三間下齒痛七壯足三里上齒痛七七壯大溪內庭下牙痛地倉崑崙腎虛牙痛出血不止頰車合谷足三里大溪眼目諸疾足三里三間二間落頰風率谷三壯炷宜小頰腫地倉唇緩不休地倉喉痹喉癬通里然谷厲兌竅陰舌縱陰谷舌強竅陰失音不語靈道暴喑聲啞通里咽喉腫痛陽谿少海液門外腫三壯頸項頰腫引耳痛前谷陽谷頸漏臨泣灸三壯一日禁灸中身證略中身者外而胸脅腹背脊臍內而五臟六腑一有所病統屬於中原其病之所起必有所因外因者由於春之風夏之熱暑長夏之濕秋之燥冬之寒也當其時而至則為正氣非其時而至或過盛則為淫邪凡此六淫為病皆屬外因亦有因於八風相感如冬至日正北大剛風立春日東北凶風春分日正東嬰兒風立夏日東南弱風夏至日正南大弱風立秋日西南謀風秋分日正西剛風立冬日西北折風應時而至主生養萬物不應時而至主殺害萬物若人感受內生重病外生癰疽凡此八風為病亦屬外因故曰外因六淫八風感也內因者起於耳聽淫聲眼觀邪色鼻聞惡臭舌貪滋味心思過度意念妄生皆損人神凡此六慾為病皆屬內因又有喜過傷心怒過傷肝思過傷脾悲過傷肺恐過傷腎憂久則氣結卒驚則氣縮凡此七情為病亦屬內因故曰內因六慾共七情也不內外因者由於飲食不節起居不慎過飲醇酒則生火消灼陰液過飲茶水則生濕停飲過食五辛則損氣血傷飢失飽則傷脾胃凡此皆飲食之致病也晝日過勞挑輕負重跌撲閃墮等類損其身形夜不靜息強力入房勞傷精氣凡此皆起居之致病也其有起於膏粱厚味者多令人榮衛不從火毒內結起於藜藿薄食者多令人腎氣不充氣血虧少凡此亦屬不內外因也夫民病百千變化其受病之原皆不出於三因茲集前後證略數則非三因之外別有致病之由蓋以病有類集治有攸分故為辨別科條縷析名目逐症分疏於後俾施治者明於辨症而無所疑惑焉一胸為肺分心脾腎肝膽胞絡七經之筋脈俱上至胸胸滿短氣陽實喘促不臥虛滿則心下痞而不痛胸痛者多屬肝之虛痛引脅背肝實不能轉側善太息余經能令胸滿短氣而亦不痛仲景云胸痹心下痞留氣結在胸胸滿脅下逆搶心非若中滿者外有腹脹之形也雞胸乃屬肺病脹滿有痰肺熱也脹滿無痰肺虛也皆胸膈高起故名雞胸一脅痛有左右之分左右者陰陽之道路也左為肝肝主血血留止滯則左痛右為肺肺主氣肝邪入肺氣不流通則右痛然亦有左痛不專主於血右痛不專於氣但按之痛不按亦痛者血也膨痛時止噯即寬暢少時復痛者氣也若痰食致痛皆在右脅必有痰食之症與氣血凝滯不同明者自辨更有房勞過度腎虛羸怯之人胸脅間多隱隱微痛此腎虛不能納氣氣虛不能生血陰陽循行之道有阻滯所以作痛若不知正本尋源而執一不化則犯虛虛之戒矣一腹堅硬是由脾陽下陷濁陰之氣乘之按之如石亦不痛但苦脹滿氣結飲食不化小兒多有此症大抵寒則收引或因傷食而成若有塊硬痛是蟲痛也又有衝脈為痛氣溢於大腸繞臍而痛有脾傷傳腎少腹冤然而痛故曰繞臍痛大腸病也臍下冷痛者腎病也一腰背痛經云巨陽虛則頭項腰背痛又曰足之三陽從頭走足足之三陰從足走腹諸經所過皆能為痛有風寒濕熱挫閃瘀血氣滯痰積由外以致內者標病也若房室勞傷腎虛而痛者本病也腰者腎之府轉搖不能腎將敗矣肩背分野屬肺喘咳逆氣肩背痛肺燥也當肩背一片冷痛此有痰飲氣積故也背心紅腫痛者風熱也紅屬火邪腫為風勝經云歲火太過民病肩背熱按背心為督脈循行部分督脈貫脊絡腎風氣從風府而下積而化熱故取肩井肺俞之穴灸而散之又外邪與流行榮衛真氣相擊搏則百節痠疼筋骨攣痛下部虛冷三陰不足故腰膝痠痛凡人真氣失調少有所虧則五邪六淫皆得乘間而入所以聖人諄諄告戒令人養攝真元為衛生卻病之上妙方也一虛癆之疾為精血內奪百脈空虛先賢經義條分縷析諄諄垂示後人秦越人發虛損之論謂虛而感寒則損其陽陽虛則陰盛損則自上而下一損損於肺皮聚而毛落二損損於心血脈不能榮養臟腑三損損於胃飲食不為肌膚過於胃則不可治虛而感熱則損其陰陰虛則陽盛損則自下而上一損損於腎骨痿不起於床二損損於肝筋緩不能自收持三損損於脾飲食不能消化過於脾則不可治此秦越人歸重脾胃為治虛勞之妙諦也至漢張仲景明立虛勞門謂五勞虛極羸瘦腹滿不能飲食食傷憂傷飲傷房室傷飢傷勞傷經絡榮衛氣傷內有乾血肌膚甲錯兩目黯黑緩中補虛大黃䗪蟲丸主之意以虛勞發熱未有不由瘀血者而瘀血未有不由內傷者治病必求其本惟仲景得之矣巢氏病源謂有虛勞有蒸病有注勞有五勞六極七傷蒸有五蒸二十四蒸注有三十六種九十九種分門異治後人以岐路之多茫然莫知適從大要無非酒色勞倦七情飲食所致故或先傷其氣氣傷必及於精或先傷於精精傷必及於氣精虛者陰虛也其病為躁煩頭紅面赤唇乾舌燥咽痛口瘡吐血衄血便血尿血大便燥結小水痛澀等症氣虛者陽虛也其病為怯寒憔悴氣短神疲頭運目眩嘔惡食少腹痛飧泄二便不禁甚至咳嗽吐痰遺精盜汗氣喘聲喑筋骨疼痛心神恍惚飢肉盡削夢與鬼交婦人月閉等症久虛不復則為損損極不復則為勞故知勞瘵之候未有不由氣血虧損而成氣不生血血瘀則營虛營虛則發熱久熱則蒸其所瘀之血化而為蟲遂成傳屍癆症其症令人寒熱盜汗夢與鬼交遺精白濁發乾而聳或腹內有塊或腦後兩邊有小結核復連數個或聚或散沉沉默默咳嗽痰涎或咯膿血如肺痿肺癰狀或腹痛下利羸瘦困倦不自勝持積月累年以致於死死復傳注親屬乃至滅門符藥罔效知此者惟取膏肓俞四花穴及早灸之可否幾半晚亦不濟矣凡灸虛勞取其助益陽氣若脈洪陽盛者又不可灸臨症審之一自汗盜汗未有不由心腎而得者也經云汗者心之液又云腎主五液心為陽虛則不能衛外而為固則外傷而自汗不分寤寐不因勞動發散溱溱然自出乃陰蒸於陽也腎為陰陰虛不能內營而秘藏則內傷而盜汗即內經所云寢汗也人寤衛氣行於陰則腠理益疏故熟睡汗出醒則漸收乃陽蒸於陰也凡虛勞發熱頰紅汗自出津液消涸虛火益炎血氣所存者寡矣若傷寒陽明欲作實必自汗邪傳少陽居半表半裡之間亦見盜汗此又當別論一血症有咳嘔吐咯唾痰涎帶血衄血便血尿血腸風臟毒又有耳目齒牙毛孔諸見血經云榮者水穀之精也和調五臟灑陳六腑乃能入於脈也源源而來生化於脾總統於心臟受於肝宣布於肺施泄於腎灌溉一身故曰血者神氣也得之則存失之則亡分而言之咳血出於肺肺又不獨咳血而亦唾血蓋肺主氣氣逆為咳腎主水水化液為唾二臟相關病則俱病若涎唾中有少血散漫者此腎從相火炎上之血也若血如紅縷在痰中咳而出者此肺絡受熱傷之血也甚至咳白血色淺紅似肉似肺死不治咯血者不嗽而咯出血也咯與唾少異唾出於氣上無所阻咯出於痰氣鬱於喉嚨之下滯不得出咯而乃出求其所屬之臟咯唾同出於腎也若上膈壅熱紫黑成塊則嘔而出氣虛不攝隨氣上越則吐而出此嘔吐皆出於胃也經雲陽絡傷則血外溢血外溢則衄血陰絡傷則血內溢血內溢則後血積熱於膀胱則閉癃溺血滲透腸中則為腸風血熱上迫則見諸耳目口舌又毛孔出血名曰血汗即肌衄又名脈溢是為極虛之候故凡血症之治須察陰陽虛實有火無火若脈浮洪數實有火者不可艾灸恐以火濟火而反促其危亡也一鼓脹病岐伯曰水始起也目窠上微腫其頸脈微動時咳陰股間寒足脛腫腹乃大以手按其腹隨手而起如裹水之狀此其候也膚脹者寒氣客於皮膚腹大身盡腫按其腹空而不起鼓脹者身腹大與膚脹同色蒼黃腹筋起腸覃者寒氣客於腸外與衛氣相搏因有所繫癖而內著惡氣乃起瘜肉乃生始大如雞卵稍以益大至其成如懷子之狀按之則堅推之則移月事以時下石瘕生於胞中寒氣客於子門子門閉塞氣不得通惡血當瀉不瀉衃以留止日以益大狀如懷子月事不以時下皆生於女子可導而下仲景云風水其脈自浮骨節疼痛惡風皮水其脈亦浮胕腫按之沒指不惡風正水其脈沉遲外症自喘石水其脈自沉腹滿不喘黃汗其脈沉遲身發熱胸滿四肢頭面腫久不愈必至癰腫內經云陰氣在上則生䐜脹夫陰氣者地氣也宜在於下今反騰於上如雲霧濃布將天之陽光蒙翳一片陰晦之象結而不開必將大作雷電繼以風雨然後霧收雲散離照光天悟此可得內經治脹之法矣古人論治有五臟之分有陰陽之別與夫風濕寒鬱積滯血蠱飲食勞倦之不一其因審證明晰然後按法施治庶無虛虛實實之誤一積聚痞塊無形而虛為痞有形而實為塊東垣云夫痞者心下滿而不痛是也太陰者濕也主壅塞乃土乘心下為痞滿也積者推而不移病在五臟聚者推而移動病在六腑肝積在左脅之下名為肥氣肺積在右脅之下名為息賁心積起臍上上入心下大如臂名為伏梁脾積在胃脘大如盤名曰痞氣腎積在臍下上衝心而痛名曰奔豚又有寒熱酒食水氣血蠱之積其症不同其治亦異經云察其邪氣所在而調治之正謂此也一心腹痛脹內經所謂九種心痛者五臟胃脘與痰蟲食積為九也又謂胃脘當心而痛後人因此一語遂將二者混為一例不知心為君主之官神靈之舍不能受邪其受者乃手心主包絡也如包絡引邪直犯心之正經而痛者則謂之真心痛必死不可治凡臟腑經脈挾其淫氣自支脈乘於心而為痛者必有各腑臟病形與之相應如靈樞謂厥心痛與背相控善瘈如從後觸其心傴僂者腎心痛也厥心痛腹脹胸滿心尤痛甚胃心痛也厥心痛如以錐針刺其心心痛甚者脾心痛也厥心痛色蒼蒼如死狀終日不得太息肝心痛也厥心痛臥若徙居動作痛益甚色不變肺心痛也故心痛各有病狀不得與胃脘痛混一而論也蓋胃為水穀之海三陽之總司五臟六腑十二經脈皆受氣於此初病在經久病入絡其或滿或脹或食不下或嘔或吞酸或大便難或瀉利面色浮而黃者皆胃之本病也其有淫邪相乘於胃病狀雖與心痛相類但其間必有胃之本病參雜而見之於外也東垣云夫心胃痛及腹中諸痛皆因勞力過甚飲食失節中氣不足寒氣乘虛而入客之故卒然而作大痛然腹痛有部分臟腑有高下如中脘痛者太陰也臍腹痛者少陰也少腹痛者厥陰也審其有形無形在臟在腑隨其高下而治之更循各藏部分穴腧而灸之則又在人之有確見也一膈噎症非由外邪所致乃憂思勞欲七情鬱結而成張雞峰所謂神思間病若不垂簾返照內觀靜養一切排遣物過不留則五火叢生氣逆梗塞血液日枯而清濁相干亂於胸中飲食不得下矣夫咽嗌梗塞氣不順利水飲不行食物難入其槁在吸門名曰膈其或食下則胃脘作痛煩悶不安須臾吐出食而安其槁在賁門名曰噎二者皆屬上焦東垣雲陽氣不得上出者曰塞五臟之所生陰也血也陰氣不得下降者曰噎六腑之所生陽也氣也陽氣結於上陰液衰於下因成此膈噎之症經云三陽結謂之膈三陽大小腸膀胱也三陽熱結津液不能上供肺用故吸門塞而食不入治者當先識此一反胃症食雖可下良久復出其槁在幽門乃中焦病或朝食暮吐暮食朝吐完穀不化小便赤大便難或如羊矢其槁在闌門病屬下焦傷寒注以晨食入胃胃虛不能克化至暮胃氣行里與邪相搏則食反出也王太僕注內經謂食不得入是有火也食入反出是無火也巢氏亦云臟冷則脾不磨而宿食不化其氣逆而成反胃此皆主於胃氣虛寒用辛香大熱之劑若脈數火氣炎上多升少降邪熱不殺穀或傷食傷飲者又不可執為虛寒而不知通變也一霍亂者由陰陽清濁二氣相干亂於腸胃心腹卒痛嘔吐下利憎寒壯熱頭痛腫暈先心痛則先吐先腹痛則先利心腹俱痛吐利並作甚至轉筋入腹則斃矣此症多發於夏末秋初四時間或有之實因殘暑新涼並時行不正之氣干犯胃陽陡然上吐下瀉湯藥有所不及惟灸法取效如神又有乾霍亂症上不得吐下不得瀉腹中痛甚俗名絞腸紗急以鹽湯灌之令其大吐庶有可生切莫與穀食雖米飲一呷入口即死必吐瀉過二三時直至飢甚方與稀粥從緩調理可也一嘔吐者東垣云皆屬於胃然亦有分別如嘔者陽明也陽明多血多氣故有聲有物氣血俱病也吐者太陽也太陽多血少氣故有物無聲乃血病也乾嘔者少陽也少陽多氣少血故有聲無物乃氣病也究三者之源皆因脾氣虛弱或因寒氣客胃加之飲食所傷而致也又有因上焦傷風開其腠理經氣失道邪氣內著身背皆熱肘臂牽痛其氣不續膈間厭悶食入即先嘔而後下名曰漏氣有下焦實大小便不通氣逆不續嘔逆不禁名曰走哺有吐食者氣熱上衝食已暴吐有噁心者胸中似喘不喘似嘔不嘔似噦不噦心中憤憤然無奈者有嘔苦者邪在膽逆在胃膽液泄則口苦胃氣逆則嘔苦有吐酸者吐出酸水如醋平時津液隨上升之氣鬱而成積久則生熱從木化而作酸故內經訓以為熱有吞酸者因鬱積之久不能自湧而出伏於肺胃之間咯不得上咽不得下肌表得風寒則內熱愈鬱而酸味刺心必須溫暖解肌忌用寒藥故東垣又以為寒若吐清水則為寒濕吐痰涎則為水飲嘔家雖嘔癰膿不可治嘔膿儘自愈更有吐蛔者仲景以為胃中冷也一咳嗽須分六氣五臟之殊而其要皆主於肺內經金匱言之詳矣後賢推衍其義各抒己見而鮮有會歸至喻氏嘉言始發內經秋傷於濕冬生咳嗽句有脫文之論乃正之曰夏傷於暑長夏傷於濕秋必痎瘧秋傷於燥冬為咳嗽六氣配四時之理燦然明矣言六氣主病風火熱濕燥寒皆能乘肺皆足致咳其濕咳即分屬於風火熱燥寒五氣中也風乘肺咳汗出頭痛痰涎不利火乘肺咳喘急壅逆涕唾見血熱乘肺咳喘急面赤潮熱甚者熱盛於中四末反寒熱移於下便泄無度燥乘肺咳皮毛乾槁細瘡濕癢痰膠便閉寒乘肺咳惡寒無汗鼻塞身疼發熱燥煩至於濕痰內動為咳又必因風因火因熱因燥因寒所挾各不相同而乘肺則一也知此六氣之致咳則比類而推觸類而長正不獨咳嗽一端即萬病亦無不了然心目間矣一呃逆即內經所謂噦也氣逆奔急上衝呃呃有聲故名呃逆其症非由一因有胃虛膈熱者有胃中虛寒者有腎氣虛損陰火上衝者有中氣不足脈虛數氣不相續而發呃者有陽明內實失下而發呃者有渴而飲水太過致水結胸而發呃者有傳經傷寒熱症誤用熱藥助起火邪痰火相傳而為呃者劉宗厚云呃逆一症有虛有實有火有痰有水氣不可專作寒論內經治噦以草刺鼻取疐而已無息而疾迎引之立已大驚之亦可已陳無擇又以噦為咳逆東垣海藏以噦為乾嘔皆謬也乾嘔無物之吐也非噦也咳逆嗽之甚者也非呃逆也許學士以噦為呃逆參之經旨的無可疑一喘哮噯氣喘有虛實實者邪氣實也虛者正氣虛也實喘者氣長而有餘脈來滑數有力虛喘者氣短而不續脈來微弱無神此脈症之不同虛實之有明辨也哮者喉中聲響如水雞聲凡遇天氣欲作雨時便發甚至坐臥不得飲食不通此肺竅中積有冷痰乘天陰寒氣從背自鼻而入則肺脹作聲或鹽水傷肺氣喘不休有延至終身不愈者亦有子母相傳者必須量虛實而治之若噯氣經無明文有謂腹脹噯氣者曰噫逆氣自下而上者亦曰噫噫者飽食之息即噯氣也多因胃虛火鬱留飲胸間或陰氣上逆擾陽陽不足以制化必作噯或婦人性多郁胸中氣緊連噯數十聲不盡者噯出氣心頭略寬不噯即緊治療之法虛則補之熱則清之寒則溫之氣則順之無遺義矣一太息善悲短氣人有憂思則心系急急則氣道約約則不利故太息以伸出之善悲者由脾郁不能顧子肺為脾子肺主悲其在天為燥在地為金在志為憂在聲為哭婦人臟燥喜悲善哭此其驗也短氣者言語無餘聲呼吸緊促是五臟皆有不足而大要多主於肺經云肺氣虛則肩背痛寒少氣不足以息故凡外而六淫五邪內而七情六慾皆足以耗氣短氣之人豈可不兢兢加謹乎一瘧疾少陽症也少陽居半表半裡邪伏於此入與陰爭則寒出與陽爭則熱少陽之脈上頭角故偏頭痛其支者從耳後入耳中過小腸聽宮穴故耳聾又下胸中貫膈循脅裡故胸脅痛少陽為甲木木病遷及於其所勝致脾胃不和作嘔膽味苦熱亦作苦故口苦淺則日作深則間日在氣則早在血則晏仲景云瘧脈自弦弦數者多熱弦遲者多寒弦小緊者下之差弦遲者可溫之弦緊者可發汗針灸也浮大者可吐之弦數者風發也以飲食消息止之只此七言汗吐下和溫之法具備其他癉瘧溫瘧牡瘧瘧母四症要不外少陽求治耳靈素金匱之文具在惜無解人而會通其精義也其有熱多寒少心煩少睡者屬心名曰溫瘧有寒多熱少腰疼足冷者屬腎名曰寒瘧有先寒而後大熱咳嗽者屬肺名曰癉瘧有熱長寒短筋脈牽縮者屬肝名曰風瘧有寒熱相停嘔吐痰沫者屬脾名曰食瘧此五臟之瘧分始巢氏病源後人謂其發明內經深信不疑而不知瘧邪不從髒髮內經所無之理巢氏臆言之耳一痢疾靈素謂之腸澼亦曰滯下多由感受風寒暑濕及飲食不節有傷脾胃宿積鬱結而成其症大便窘迫裡急後重至圊而不能便腹中疼痛所下或白或赤或赤白相雜或下鮮血或如豆汁如魚腦如屋漏水如塵腐色有下純黑者有下純紅者有大孔如竹筒直出者有飲食不下為噤口痢有乍作乍止為休息痢此為感有輕重積有淺深症有順逆治分氣血丹溪謂白痢氣病由大腸來赤痢血病由小腸來赤白相兼氣血俱病通考古今治痢者皆曰熱則清之寒則溫之初起熱甚則下之有表症則汗之小便赤澀則分利之此五者舉世信用奉為準繩不知五法之中可用者一忌用者四倪氏發明四忌之義謂一忌溫補痢之為病由濕熱蘊積膠滯於腸胃之中初病即投溫補將邪氣補實腸胃之熱益熾內攻臟腑至於不可救療者比比然也一忌大下痢因邪熱膠滯腸胃而成與溝渠壅塞相似惟用藥磨刮疏通則愈若大下之譬如以清水蕩壅塞之渠塞必不可去徒傷胃氣損元氣而已迨正傷邪盛飲食不進而成噤口鮮有不即於危亡者也一忌發汗痢有身發寒熱頭痛目眩者此非外感乃內熱熏蒸自內達外雖有表症實非表邪也若發汗則耗其正氣而邪氣得以肆行且風劑燥熱愈助熱邪表虛於外邪熾於內若此而生者幸而免爾一忌分利小便利小便治水瀉之良法也痢本因邪熱滯下津液枯澀而成複利其小水則津液愈枯澀塞愈盛遂至纏綿不已是則分利之過也學人知所忌則知所治矣灸家取穴乃引火化氣一法非若亂投熱藥以火救火至爛人腸胃而不顧也一泄瀉即古之所謂下利也丹溪云有濕有氣虛有痰火食積戴復庵云瀉水腹下痛者濕也飲食入胃輒瀉完穀不化者氣虛也腹痛泄水腸鳴痛一陣瀉一陣者火也或瀉或不瀉或多或少者痰也腹痛甚而瀉瀉後痛減者食積也又濕多成五泄戴云飧泄者水穀不化而完出濕兼風也溏泄者漸下汙積黏垢濕兼熱也鶩泄者所下澄清冷小便清白濕兼寒也濡泄者體重軟弱泄下多水濕自甚也滑泄者久下不能禁固濕勝氣脫也又云飲食不化色黃者胃泄也腹脹滿泄注食即嘔逆者脾泄也食已窘迫大便色白腸鳴切痛者大腸泄也溲而便膿血少腹痛小腸泄也裡急後重數至圊而不能便莖中痛者大瘕瀉也諸泄瀉小便不利者先分利之若食積痛瀉必當先推蕩其食老人虛泄當益其脾病後作瀉宜調其胃求其所因而治之又不得謂諸瀉利之必利小便也一黃疸症由濕熱熏蒸而成名分五疸症各不同一日黃汗汗出染衣色如柏汁一日黃疸身目皆黃便黃無汗一曰谷疸因飲食傷脾而得一日酒疸因酒後傷濕而得一曰女勞疸因色欲傷陰而得總之不出陰陽二症陽症多實多熱陰症多虛多寒羅謙甫辨之詳矣一消渴有上中下之分大渴引飲隨飲隨渴病在肺名曰上消多飲善飢不為肌肉病在脾名曰中消小便黃赤為淋為濁如膏如脂面黑目焦日漸消瘦病在腎名曰下消經曰二陽結謂之消又曰二陽之病發心脾其傳為風消又心移寒於肺肺消者飲一溲二死不治心移熱於肺傳為膈消勿泥丹溪五疸同治而不分辨也一痰飲二者略有不同飲由飲食停積其病全在脾胃痰則隨氣變化無處不有古人云痰生百病謂百病皆足以生痰非謂百病之由痰而生也故知痰之為病不由一因有因外感而生者有因內傷而起者誠知外感者何氣迎其機而導之邪退則痰自平矣起於內傷者何病察所傷以調之氣化則痰亦化矣若見痰治痰而謂痰消病自愈者則吾未之聞也一不寐者有邪實內擾而神不安有正虛真陰不足而神不守舍病雖有不同惟邪正二字皆足以該之帝曰人之多臥者何氣使然岐伯曰此人腸胃大皮膚濕而分肉不解焉衛氣晝行於陽夜行於陰陽氣盡則臥陰氣盡則寤衛氣留久於陰故卒然多臥一怔忡者心胸築築振動惶惶惕惕無時得安者是也驚者心忽外有所感動卒然而驚懊憹者鬱悶之貌情不舒暢憒然無奈比之煩悶而甚也悸者心有所恐時怯怯如人將捕之心虛膽怯之所致也若恐懼則與悸相似而健忘則又為心脾二經之不足矣夢魘者心腎不交精神散越宜滋養心腎自安身部證治胸滿期門至陽胸背切痛風門期門少府胸脅支滿俠谿胸脅疼膈俞支溝邱墟胸膈痰壅公孫脅痛奄奄欲絕此為奔豚急以熱湯浸兩手足頻頻易之氣海關元期門陰竅左脅積痛肝俞此穴若同命門一併灸兩目昏暗者可使復明兩脅脹滿膽俞意舍陰陵泉腹硬期門龜背肩中俞腎俞膏肓曲池合谷雞胸中府膻中靈道足三里腰背重痛腰俞大腸俞膀胱俞身柱崑崙灸腰痛不可俯仰令患人正立以竹杖拄地量至臍中用墨點記乃用量脊中即於點處隨年壯灸之灸訖藏竹杖勿令人知背上冷痛神道腰挫閃痛起止艱難脊中腎俞命門中膂內俞腰俞腰膝痠痛環跳崑崙陽陵泉養老筋骨攣痛三陰交合谷百節痠疼陽輔背心紅腫痛肩井肺俞風門五樞臍下冷痛氣海膀胱俞曲泉繞臍痛大腸病也水分天樞三陰交足三里上氣胸背滿痛肺俞肝俞雲門乳根巨闕期門梁門內門尺澤脅肋脹痛膈俞章門陽陵泉邱墟諸氣膈痛上氣不下天突膻中中府膈俞虛勞諸虛勞熱氣海關元膏肓足三里內關治勞熱良房勞太谿虛損中極大椎肺俞膈俞胃俞三焦俞腎俞中脘天樞氣海足三里三陰交長強崔氏四花六穴凡男婦五勞七傷氣血虛損骨蒸潮熱咳嗽痰喘五心煩熱四肢困倦羸弱等症並治第一次先取二穴令患人平身正立取一細繩約長三四尺者蠟之勿令伸縮乃以繩頭與男左女右足大拇指端比齊令其順腳心至後跟踏定卻引繩向後從足跟足肚貼肉直上至膝彎曲膕中大橫紋截斷次令病者平身正坐解發分頂中露頂路取所比蠟繩一頭齊鼻端按定引繩向上循頭路項背貼肉垂下至繩頭盡處以墨記之此非是灸穴別又取一小繩令患者合口將繩雙摺自鼻柱根按定左右分開比至兩口角如人字樣截斷即將此繩展直取中橫加於前記脊中墨點之上其兩邊繩頭盡處以墨記之此第一次應灸二穴名曰患門上法若婦人足小者難以為則當取右臂自肩髃穴起以墨記之伸手引繩向下比至中指端截斷以代量足之法庶乎得宜第二次取二穴令患人平身正坐稍縮臂膊取一蠟繩繞項後向前雙垂頭與鳩尾尖齊雙頭一齊絕斷卻翻繩頭向後將此繩中折處正按結喉上其繩頭下垂脊間處以墨記之此非灸穴又取一小繩令患人合口橫量齊兩吻截斷還加於脊上墨點處橫量如前法於兩頭盡處點墨記之此是第二次灸穴即四花之左右兩穴也前共四穴同時灸之初灸七壯或二七三七以至百壯為妙俟灸瘡將瘥或火瘡發時又依後法灸二穴第三次取二穴以第二次量口吻短繩於第二次脊間墨點處對中直放務令上下相停於繩頭盡處以墨記之此是灸穴即四花之上下兩穴也上共六穴宜擇午日火日灸之後百日內宜慎房勞思慮飲食適時寒暑得中將養調護若瘡愈後仍覺未瘥依前再灸無不愈者故云累灸至百壯但骨脊上兩穴不宜多灸凡一次只可三五壯多則恐人倦怠若灸此六穴亦宜灸足三里瀉火方妙愚按前法灸脊旁四穴上二穴近五椎心俞下二穴近九椎肝俞崔不知穴名而但立取法蓋欲人之易曉耳然稽脊背穴法則太陽二行者當去脊中各開二寸方得正脈乃可獲效用者仍宜審之一法取手掌中大指根稍前肉魚間近內側大紋半指許外與手陽明合谷相對按之極酸者是穴此同長強各灸七壯甚妙傳屍癆第一代蟲傷心宜灸心俞穴並上下如四花樣第二代灸肺俞四穴如前第三代灸肝俞四穴如前第四代灸陰俞四穴如前第五代灸腎俞四穴如前第六代灸三焦俞四穴如前此症五日輕五日重輕日其蟲大醉方可灸又須誦蓮經並普庵咒鎮之一法灸腰眼穴其法令病人平眠以筆於兩腰眼宛宛中點二穴各灸七壯此穴諸書所無而居家必用載之云其法累試累驗主治癆瘵已深之難治者於癸亥日二更盡三更初令病人平眠灸三壯一傳屍癆瘵以致滅門絕戶者有之此症因寒熱前作血凝氣滯化而為蟲內食臟腑每致傳人百方難治惟灸可攻其法於癸亥日二更後將交夜半乃六神皆聚之時勿使人知令病者解去下衣舉手向上略轉後些則腰間兩旁自有微陷可見是名鬼眼穴即俗所謂腰眼也正身直立用墨點記然後上床合面而臥用小艾炷灸七壯或九壯十一壯尤好其蟲必於吐瀉中而出燒燬遠棄之可免傳染此比四花等穴尤易且效穴在腎俞下三寸夾脊兩旁各一寸半以指按陷中一法凡取癆蟲可於三椎骨上一穴並膏肓二穴各灸七壯然後以飲食調理方下取蟲等藥骨蒸寒熱夜熱百勞膏肓肺俞魄戶脾俞腎俞四花穴間使足三里虛怯飲食不化膈俞脾俞胃俞中脘梁門內關天根足三里汗症自汗膏肓大椎復溜盜汗肺俞復溜譩譆瘧多汗亦灸多汗少力大橫痼冷此腎與膀胱虛寒也多灸愈妙脾俞神闕關元氣海此穴亦治陽脫血症虛勞吐血上脘肺俞脾俞腎俞大陵外關咯血風門吐血百勞肺俞心俞膈俞肝俞脾俞腎俞脊骨天樞大淵通里間使大陵中脘足三里怒氣傷肝吐血肺俞肝俞脾俞腎俞間使足三里衄血上星灸一壯即止一日七七壯少則不能斷根囟會亦如上星風門膈俞脊骨百勞合谷湧泉一法於項後髮際兩筋間宛中穴灸三壯蓋血自此入腦注鼻中故灸此立止即啞門穴便血中脘氣海上二穴灸脫血色白脈濡弱手足冷飲食少思強食即嘔凡大便下血諸治不效者但取脊骨中與臍相平須按脊骨高突之處覺痠疼者是穴方可於上灸之不疼者非也灸七壯即止如再發即再灸七壯永可除根腸風奇穴其穴在脊之十四椎下傍各開一寸年深諸痔灸之最效尿血膈俞脾俞三焦俞腎俞列缺章門大敦鼓脹千般鼓脹要先知切忌臍高突四圍肚上青筋休用藥陰囊無縫不堪醫背平如板終難治掌上無紋有限時五穀不消十日死肚光如鼓療延遲痰多氣短皆無藥十個當知九個危任使神醫難措手勸君臨症識權宜鼓脹灸治太白水分氣海足三里天樞中封又法先灸中脘七壯引胃中生髮之氣上行陽道水腫中脘水分水溝合谷足三里神闕氣海膈俞三陰交石門中極曲骨內關陰市陰陵泉中封太衝照海公孫虛腫解谿復溜公孫石水然谷章門血鼓膈俞脾俞腎俞間使足三里復溜行間單鼓脹肝俞脾俞三焦俞水分公孫大敦腫滿難步太衝亦治虛勞浮腫飛陽脾虛腹脹公孫三里內庭腹中氣脹此症飲食反多身形消瘦脾俞章門積聚痞塊久痞中脘章門三焦俞三陰交內庭幽門上脘脾俞氣海凡治痞者須治痞根無不獲效其法於十二椎下當脊中點墨為記墨之兩旁各開三寸半以手揣摸自有動處即點墨灸之大約穴與臍平多灸左邊或左右俱灸此痞根也或患左灸右患右灸左亦效結積留飲通谷上脘中脘積氣上奔急迫欲絕期門天樞梁門奔豚氣逆痛不可忍關元肺積名息奔在右脅下尺澤章門足三里心積名伏梁起臍上上至心下後谿神門巨闕足三里肝積名肥氣在左脅下肝俞章門行間脾積名痞氣橫在臍上二寸脾俞胃俞腎俞通谷章門足三里腎積名奔豚生臍下或上下無時腎俞關元瘕癖中極臍下積聚疼痛湧泉氣塊脾俞胃俞腎俞梁門天樞氣海長桑君針積塊癥瘕先於塊上針之甚者又於塊首一針塊尾一針針訖灸之效痞塊悶痛大陵中脘三陰交食積血瘕胃俞氣海行間心腹痛脹九腫心痛巨闕靈道曲澤間使通谷穴在乳下二寸千金治心痛惡氣上脅痛急灸五十壯鬼擊心痛欲絕支溝又急灸大拇指足甲男左女右三壯肺心痛臥若伏龜大淵尺澤上脘膻中胸痹痛又治心痛灸虎口白肉際各七壯脾心痛痛如針刺內關大都太白足三里連承山公孫肝心痛色蒼蒼如死狀終日不得休息行間太衝腎心痛悲懼相控太谿然谷胃心痛巨闕大都太白足三里連承山胃脘痛膈俞脾俞胃俞內關陽輔商邱心脾脹痛上脘中脘脾俞胃俞腎俞隱白足三里腹中脹痛膈俞脾俞胃俞腎俞大腸俞中脘脾寒水分天樞石門心下堅滿內關足三里商邱脾虛小腹脹痛三焦俞章門三陰交足三里邱墟太白行間氣海治臍下三十六疾小腹痛欲死者灸之即生噎症膈噎膻中奇經任脈穴中脘奇經任脈穴膏肓灸百壯足太陽經穴內關手厥陰經穴食倉即胃倉足太陽經穴足三里足陽明穴心俞足太陽經穴膈俞足太陽經穴脾俞足太陽經穴天府手太陰經穴乳根足陽明經穴憂噎心俞足太陽經穴思噎天府手太陰經穴神門手少陰經穴脾俞足太陽經穴勞噎膈俞足太陽經穴勞宮手厥陰經穴氣噎膻中奇經任脈穴天突奇經任脈穴膈俞足太陽經穴脾俞足太陽經穴腎俞足太陽經穴乳根足陽明經穴關衝手少陽經穴足三里足陽明穴大鐘足少陰經穴解谿足陽明經穴食噎乳根足陽明經穴諸咳喘嘔噦氣逆咳嗽丹田膻中身柱列缺天突俞府華蓋乳根風門肺俞至陽寒嗽肺俞膏肓靈臺至陽合谷列缺天突三里熱嗽肺俞膻中尺澤大溪咳嗽紅痰列缺百勞肺俞中脘諸喘氣急天突璇璣華蓋膻中乳根期門氣海咳逆膏肓解谿陰竅哮喘五哮中惟水哮乳哮酒哮為難治璇璣華蓋俞府膻中大淵足三里肩井治冷風哮有孕勿灸肩中俞治風哮小兒鹽哮法於男左女右手小指尖上用小艾炷灸七壯無不除根未除再灸久嗽不愈將本人乳下約離一指許有低陷之處與乳直對不偏者名直骨穴如婦人即按其乳頭直向下看其乳頭所到之處即是直骨穴位灸艾三炷艾炷如赤豆大男灸左女灸右不可差錯其嗽即愈如不愈其病再不可治嘔吐不下食膈俞三焦俞巨闕嘔吐不思飲食上脘中脘冷氣嘔逆章門大陵尺澤太衝後谿吐食反胃氣海下脘脾俞膈俞中脘三里胃俞上脘膻中乳根水分天樞大陵日月嘔吐吞酸意舍嘔吐吞酸噦逆腋下穴千金翼治噦噫膈中氣閉塞灸腋下聚毛宛宛中附肋處五十壯良效中府風門肩井承漿膻中中脘期門氣海足三里三陰交乳根三壯火到肌即定其不定者不可救也乾嘔膽俞至陰間使霍亂逆冷巨闕中脘建里水分承山三陰交逆冷照海大都霍亂轉筋湧泉灸三七壯如不應灸足踵聚筋上白肉際七壯立愈又法灸足外踝骨尖上七壯夾脊穴千金云令病者合面臥伸兩手著身以繩橫牽兩肘尖當脊間繩下兩旁相去各一寸半所灸百壯霍亂吐瀉中脘天樞氣海凡霍亂將死者用鹽填臍中灸七壯立愈又法灸肘尖骨罅中七壯乾霍亂即俗所謂絞腸痧也急用鹽湯探吐並以細白乾鹽填滿臍中以艾灸二七壯效噯氣中脘善太息中封商邱公孫善悲心俞大陵大敦玉英膻中氣短大椎肺俞肝俞不語內關足三里太衝尺澤不語天突肩井氣海陽脫瘧瘧疾大椎三椎譩譆多汗章門環跳承山飛陽崑崙公孫合谷寒瘧太谿至陰間使久瘧後谿間使百勞中脘脾俞胃俞少府內關足三里曲池陷谷溫瘧然谷大陵痰瘧痃癖膈俞痢久痢中脘脾俞天樞三焦俞大腸俞足三里三陰交裡急後重下脘天樞照海赤白痢長強命門泄瀉久瀉滑脫下陷百會脾俞腎俞虛寒久瀉關元中極天樞腹痛手足冷三陰交腹滿中脘梁門氣海手足厥冷大瀉氣脫氣海天樞水分水穀不分脾泄色黑脾俞胃泄色黃胃俞大腸泄白色大腸俞小腸泄色赤小腸俞大瘕泄天樞水分各三七壯腎泄夜半後及寅卯之間泄者命門天樞氣海關元水漬入胃名曰溢飲渴而飲水水下又泄泄又大渴大椎穴在一椎之上腸鳴神闕陷谷承滿老人虛人泄瀉神闕關元脾俞大腸俞黃疸公孫至陽脾俞胃俞酒疸目黃面發赤斑膽俞女勞疸腎俞消渴承漿太谿支正陽池照海腎俞小腸俞手足小指穴即手足小指尖頭痰症痰飲吐水巨闕痰火百會膏肓發狂陰症冷痰氣海三陰交痰眩中脘傷酒嘔吐痰眩率谷顛狂癇痙驚悸不寐顛狂百會人中天窗狂邪鬼語身柱神道心俞筋縮骨骶章門天樞少衝女灸此勞宮內關神門陽谿足三里下巨虛豐隆衝陽男灸此太衝厲兌前谷後谿燕口在口吻兩邊赤白肉際足大指橫紋穴卒顛病灸兩腳大指聚毛中七壯顛癇神庭身柱靈道金門承命穴在內踝後上行三寸動脈中主治狂邪驚癇灸三十壯申脈陽蹺穴晝發灸此照海陰蹺穴夜發灸此凡灸二蹺穴必先用藥下之否則痰壅殺人又云風癇可灸驚熱不可灸風癇百會上星身柱心俞筋縮章門神門天井陽谿灸此不必灸合谷合谷灸此不必灸陽谿足三里太衝狂言不避水火間使百會暴啞不能言速灸臍下四寸並小便陰毛際骨陷中各灸七壯重者二七壯並手足中指頭盡處各灸三壯神效男灸左女灸右五痙脊強身柱大椎陶道瘛瘲靈道少府怔忡健忘不寐內關液門膏肓解谿神門好臥厲兌驚悸膽俞解谿驚恐見鬼陽谿懊憹心悸通里心虛膽寒少衝癡呆神門心俞夢魘鬼擊人中上星水溝鬼眼秦承祖灸鬼法取鬼哭穴一名手鬼眼一名足鬼眼法以二拇指並縛一處須甲肉四處著火各灸七壯用治顛癇夢魘鬼擊並五癇癡呆及傷寒發狂等症皆效凡夜夢魘死者皆由平日神氣不足致使睡臥神不守舍魂不依體凡魘者切不可執燈照之但向暗中呼其名即醒又法齧患人足大指甲側即蘇又法用牙皂末吹入鼻中亦妙若經一二更者亦可灸之又一法灸大敦穴七壯即醒
