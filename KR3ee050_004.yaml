body:
  text: 卷之四手足證略手足為諸陽之本陽之氣主動以應天經曰天有十日人有手十指以應之天有十二行人有足十指莖垂以應之又曰足受血而能步掌受血而能握指受血而能攝故凡人之日用動作無不藉力於手足血氣盛者則健舉輕便血氣衰者則委頓沉重其中於病也或傷於風或傷於寒或傷於濕所傷之因有不同而手足上下之病亦有異經云風為百病之長其變無常濕留關節令人四肢不仁風邪從陽而親上濕邪從陰而親下惟陰寒之氣挾風濕而來因人之虛隙以乘之上下中外無定處故寒氣積而不瀉則溫氣去血凝澀脈不通手足為之攣痛經所謂冬氣滿在四肢是也又肺心有邪其氣留於兩肘肝有邪其氣留於兩股脾有邪其氣留於兩髀腎有邪其氣留於兩膝此五臟有邪留為手足之病而其要皆統於脾蓋脾主四肢脾脈太過為病在外則令人四肢不舉脾藏在體為肉形不足則四肢不用此可以驗脾之虛實而知手足致病之大略也一臂痛人皆謂風寒襲臂而然不知邪之所湊其氣必虛宜分別經絡而治之先令病者以兩手伸直其臂貼身垂下大指居前小指居後其臂臑之前廉痛者屬陽明經後廉痛者屬太陽經外廉痛者屬少陽經內廉痛者屬厥陰經內前廉痛者屬太陰經內後廉痛者屬少陰經視其何經受病按經取穴以行灸法庶無南轅北轍之誤若手腫痛或指掌連臂膊痛謂之手氣或臂痛不舉或癰毒僕傷皆是氣血凝滯臂連肩背痠痛兩手軟痹由痰飲流入四肢又有血不榮筋而致臂痛者當養其血痛自止也又血燥筋攣遇寒則劇此肝氣虛弱風寒客於經絡故也若手足拘攣麻木又為脾肺氣虧濕邪不化以致此耳一痹之為言閉也經云風寒濕三氣雜至合而為痹其風氣勝者為行痹寒氣勝者為痛痹濕氣勝者為著痹其有筋脈肌皮骨五痹之目以明春夏四季秋冬五氣之所感受各主一臟也非三氣之外又別有此五症也所謂行痹者痛無定處俗名鬼箭風又名流火古云歷節風又曰白虎歷節風晝則靜夜則動其痛徹骨如虎齧之狀風痹痛有定處或四肢拘攣關節疼痛名曰痛風著痹者麻木不仁素問云營氣虛則不仁衛氣虛則不用營衛俱虛則不仁且不用靈樞曰衛氣不行則為麻木東垣宗之以麻痹之症必補衛氣而行之景嶽云治痹之法祗峻補其陰宣通脈絡不宜過用風燥之劑亦內經之旨也又風痹流行上中下三部乘人臟腑之虛與血氣相搏聚於關節而作痛若腿腳生瘡渾身瘙癢是其人本血虛因風濕傷脾主肌肉肌肉腠理為邪壅閉不得宣達而作癢此二者專主風濕而言然又有冷痹熱痹痰痹血痹胸痹胞痹腸痹周痹當詳症脈分別治之要不外劉李二氏所論一以攻邪為主邪去則正氣自安一以補正為要正復則邪氣自卻當攻當補左執經者善行其權也一腿叉風憎寒發熱或筋攣腫痛當陰股抅間足厥陰之脈上膕內廉循股陰入毛中人有鬱怒肝氣積而不行下注於腿叉而作痛或風寒內犯肝腎陽氣留止亦有此症人多以為濕熱下流是知其一而不知其二也一鶴膝風兩膝腫大胻腿枯細象如鶴膝之形俗謂之鼓槌風總不過風寒濕三氣之為病然腫病必有邪滯枯細者必因血虛初起可用蔥尉消法久宜養氣滋血為主再視其外症何如兼治之可也一足發熱多屬陰虛如腎水虧耗脛膝痠軟而足熱肝血不足筋脈隱痛而足熱脾陽下陷腹脹腿痠而足熱虛勞之人每有此症然亦有濕熱下注壅遏營衛常行之道兩不相下其氣蒸騰而發熱是又不可視為陰虛而一例治之也一腳氣之疾東垣謂實水濕之所為也初覺即灸患處二三十壯以道引濕氣外出遂不至成大患按古無是名稱自晉蘇敬始其頑麻腫痛者即經所謂痹厥也痿軟不收者即經所謂痿厥也其衝心者即經所謂厥逆也自東垣發寒濕濕熱之論後學泥之遂成南北二派不知人在氣交之中正變邪感何地不然非南人不患北病北人不患南病也在善治者察明經絡所起復審六氣中何氣當之如病者頭痛目眩項強腰脊身體經絡外踝之後循京骨至小指外皆痛太陽經症也如翕翕寒熱呻欠口鼻乾腹脹髀膝臏中循胻外臁下足跗入中指內間皆痛陽明經症也如口苦上喘脅痛面垢體無光澤頭目痛缺盆並腋下如馬刀腫自汗振寒發熱胸中脅肋髀膝外至胻絶骨外踝及諸節指皆痛少陽經症也如腹滿夾咽連舌系急胸膈痞滿循胻骨下股膝內前廉內踝過核骨後連足大指之端內側皆痛太陰經症也如腰脊痛小指之下連足心循內踝入跟中上腨內出膕中內廉股肉皆痛上衝胸咽飢不能食麵黑小便淋閉咳唾不已善恐心惕惕如人將捕之小腹不仁者難治此少陰經症也如腰脅偏疼從足大指連足趺上廉上膕至內廉循股環陰抵小腹夾臍諸處脹痛兩腳攣急嗌乾嘔逆洞泄厥陰經症也以上六經各隨其氣所勝者而調之庶無有誤一痿症又名軟風手足痿軟而無力百節緩縱而不收經分五臟之熱名病其所屬皮脈筋肉骨五痿是也肺熱葉焦則皮毛虛弱急薄著則生痿躄心氣熱則下脈厥而上上則下脈虛虛則生脈痿肝氣熱則膽泄口苦筋膜乾筋膜乾則筋急而攣發為筋痿脾氣熱則干而渴肌肉不仁發為肉痿腎氣熱則腰脊不舉骨枯而髓減發為骨痿此五痿者經從臟氣所要者各舉其一以為例會而通之則五勞五志六淫盡得成五臟之熱以為痿也丹溪會合經旨謂瀉南方則肺金清而東方不實何脾傷之有補北方則心火降而西方不虛何肺熱之有誠為治痿之大法又諸痿之病未有不因陽明虛而得者治痿獨取陽明確有真見外此無餘義矣一轉筋病仲景謂其臂腳直脈上下行微弦足太陽之下血氣皆少則善轉筋踵下痛又云諸筋者皆屬於節又云肝血虛筋無所養轉結而痛此與傷寒異也夫傷寒霍亂者其本在於陽明胃經也陰陽反戾清濁相干上下相離營衛不能相維故轉筋攣痛經絡亂行暴熱吐瀉中焦衛氣所主也有從標而得之者有從本而得之者有從標本而得之者六經之變治各不同察其脈色知犯何經隨經標本各施其治則撥亂反正之功可收效於須臾之頃也手足症治肩臂冷痛凡人肩臂冷痛者每遇風寒肩上多冷或日須熱手撫摩夜須多被擁蓋庶可支持此以陽氣不足氣血衰弱而然若不預為之治恐中風不遂等症由此而成也須灸肩髃二穴方免此患蓋肩系兩手之安否環跳系兩足之安否此不可不灸輕者七壯風寒甚者十四壯或分二三次報之但不可過多恐臂細也若灸環跳則四五十壯無害又法灸膏肓肩井臂痛不舉肩井肩髃曲池淵液曲澤臂肘掣痛後溪項強肘痛大淵手腕痛陽谷手膊痛手臂紅腫液門中渚受濕手足拘攣曲池尺澤腕骨外關中渚五虎在手食指無名指背間本節前骨尖上各一穴握拳取之主治手指拘攣臂腕五指疼痛腕骨支正四肢麻戰蜷攣中渚五痹曲池外關合谷中渚膏肓肩井肩髃上中下三部痹痛足三里冷痹陽陵泉足痹不仁腰俞懸鐘濕痹趾疼同治手背癰毒中渚渾身瘙癢麻痹風市懸鐘腿叉風腎俞環跳陽陵泉懸鐘崑崙膝風腫痛足三里陽陵泉陰陵泉太衝崑崙足發熱湧泉然谷膝脛冷痛曲泉厲兌膝臏腫痛厲兌此穴合隱白治夢魔腳氣忽覺有蟲自足心行至腰中即暈絶久方蘇醒此真腳氣也初覺即宜灸足三里懸鐘絶谷風市肩井陽陵泉陽輔崑崙照海太衝白虎歷節風風市此穴在膝上七寸外側兩筋間又法令正身平立直隨兩手著腿當中指頭盡處陷中是穴灸三五壯玉龍兼陰市能治腳膝乏力兩足轉筋陽陵泉承山邱墟三陰交照海腳踝內筋急灸內踝四十壯外筋急灸外踝四十壯腿膝冷痹鶴膝風陽陵泉環跳風市濕痛兩腿瘡癢血海寒濕筋攣疼痛環跳風市痿症湧泉陰谷陽輔足內廉腫痛肩井三陰交大敦足腕腫痛解溪邱墟寒濕腳瘡取足跗上三寸許足腕正中陷處是穴灸七壯神效此穴當即是解溪穴照海手足逆冷大都僕傷肘背痛肩井陽池足腨腫不得履地崑崙二陰症略夫二陰者所以通水道傳糟粕為地道之要會也經曰濁陰出下竅下竅者下焦之竅也凡人飲食入胃其精氣先輸脾歸肺上行春夏之令以滋養周身乃清氣為天者也升已而下輸膀胱行秋冬之令為傳化糟粕轉味而出乃濁陰為地者也人能順四時之氣起居有時以避寒暑飲食有節及不暴喜怒以順神志常欲四時均平而無偏勝則安不然外感六氣之淫內動五志之火則大小便不通或不禁遺精濁淫諸淋痔疝之症作矣分列各條於後一夢遺精滑丹溪分為二症謂夢與鬼交為夢遺不因夢感而自遺者為精滑其實總為一遺精也戴氏云遺精得之有四有用心過度心不攝腎以致失精者有因思色欲不遂致精失位輸瀉而出者有色欲太過滑泄不禁者有年壯氣盛久無色欲精氣滿泄者其所由不同其狀亦不一也考古治夢遺方屬鬱滯者居大半是又不專主於固澀也如果腎虛精滑宜治以補澀若屬郁滯宜治以通利如濕熱內蘊當從脾胃酌治如欲火大熾思想無窮當從心治醫家大法總不外此數者審而用之可也一白濁之症經所謂思想無窮入房太甚發為白淫又脾移熱於腎出白二者皆隨溲而下也又有濕痰流注者有胃中濁氣下流滲入膀胱者丹溪謂赤濁者為心虛有熱由思慮而得之白濁者為腎虛有寒因嗜愆而得之又曰赤屬血因小腸屬火故也白屬氣由大腸屬金故也靈樞謂中氣不足溲便為之變必先補中氣使升舉之而後分其臟腑氣血赤白虛實以治方得經旨一精冷無子何以明之有稟受先天北方寒水之氣腎臍常冷而不溫雖當壯盛之年亦隨肝陽鼓動而施泄然氣體本寒如春行冬令萬物不得遂其生此不可以法治有勞傷少陰之臟真陽失守寒氣留止所藏之精故無沖和生化之氣可用矣法以散寒助暖則陽施陰化自得其平易曰男女構精萬物化生男女者乾坤之道也乾以中爻之坤而成坎坤以中爻之乾而成離坎為水離為火水中得火而既濟之象成焉若火獨炎上水獨潤下水火不交則為未濟何生化之有靈樞曰兩神相搏合而成形常先身生是謂精精冷者腎氣虛寒也一淋症大綱有二一曰濕脾受積濕之氣小便黃赤甚則淋一曰熱風火鬱於上而熱其病淋是也分而言之有石淋小便下如沙石有勞淋勞倦即發有血淋心主血氣通小腸熱甚則搏於血脈血得熱則流行入胞中與溲俱下有膏淋肥液若脂膏又名肉淋有氣淋胞內氣脹小腹滿出少善數尿有餘瀝有冷淋冷氣客於下焦邪正交爭滿於胞內水道不宣先寒戰然後便數成淋學者能識其大綱悉其條目淋之為病無遁情矣又有胞痹者經云小腹膀胱按之內痛若沃以湯澀於小便上為清涕此因風寒濕邪氣客於胞中則氣不能化出故胞滿而水道不通症似淋而非淋也一二便之病皆由於氣邪氣實則祕塞不通正氣虛則遺泄不攝如大便祕者有風祕冷祕氣祕熱祕有老人津液乾燥及婦人分産亡血或發汗利小便病後氣血未復皆能作祕潔古云臟腑之祕不可一概治療仲景云脈有陽結陰結者其脈浮數而能食不大便者陽結也脈沉遲而不能食身體重大便反硬陰結也東垣雲陽結者散之陰結者熱之如腹中積痛亦陰結也故灸法為宜小便不通者東垣云皆邪熱為病分在血在氣而治之如渴而不利者熱在上焦肺分不渴而小便不通者熱在下焦血分內經云無陽則陰無以生無陰則陽無以化又云膀胱者州都之官津液藏焉氣化則能出矣丹溪用吐法以提其氣氣升則水自降亦取其氣化而已又三焦者決瀆之官水液出焉灸家治小便不利但取三焦穴不取膀胱也遺尿者心腎氣虛陽氣衰冷致令膀胱失傳送之度溺出不自覺也經云膀胱不約為遺溺又謂督脈生病肝所生病皆遺溺以二經循陰器系廷孔病則營衛不至氣血勞劣莫能約束水道之竅故遺失不禁也若遺溺偏墜乃肝腎之病也尿血精出又兼心肺之症總之二便為病多由脾胃不能轉輸寒熱虛實臟腑相干各有所因宜考諸明論而細為分辨也一疝病睪丸脹痛及少腹足厥陰經之病也經云任脈為病男子內結七疝女子帶下瘕聚又督脈生病從少腹上衝心而痛不得前後為沖疝又曰胛傳之腎病名曰疝瘕又三陽為病發寒熱其傳為㿗疝又邪客於足厥陰之絡令人卒疝暴痛靈樞曰足陽明之筋痛為㿉疝腹筋急足太陰之筋病陰器紐痛下引臍兩脅痛足厥陰之筋病陰器不用此靈素言疝各從諸經脈所生張仲景言皆由寒邪得之後人更立七疝之名曰寒水筋血氣狐㿗是也分言病狀各立方主治可謂詳且盡矣然此統言兩丸俱病又有偏一者不可不明夫人有兩腎其左腎屬水水為血屬統納左之血者肝木之職故諸寒收引則血泣所以寒血從而歸肝下注於左丸其右腎屬火火為氣屬統納右之氣者肺金之職故諸氣憒鬱則濕聚所以濕氣從而歸肺下注於右丸且睪丸所絡之筋非盡由厥陰而太陰陽明之筋亦入絡也常見人偏患於左者則痛多腫少偏於右者則痛少腫多此其驗也一前陰痛經云太陰司天濕氣下臨腎氣上從陰痿氣衰而不舉陰痿者皆耗散過度傷於肝筋所致經謂足厥陰之經其病傷於內則陰痿不起是也又云足厥陰之筋傷於熱則縱挺不收傷於寒則陰縮入治在行水清陰氣是也莖中痛者是厥陰經氣滯或寒濕凝聚或濕熱下注或血虛脹痛或氣虛隱痛當視其所以而觀其所由若病淋作痛又當別論一痔漏多由酒色過度濕熱充乎臟腑溢於經絡下墜穀道之左右衝突為痔久不瘥變為漏也內經所謂因而飽食經脈橫解腸澼為痔又謂少陰之復為痔又督脈生病癃痔巢氏有五痔之論謂肛邊生鼠突出在外時時出膿血牡痔也肛邊腫生瘡而出血者牝痔也肛邊生瘡癢而復痛出血者脈痔也肛邊腫核痛發寒熱而血出者腸痔也因便而清血隨出者血痔也又有酒痔肛邊生瘡亦有血出有氣痔大便難而血出肛亦出外良久不收諸痔皆由氣血勞損久成痔漏至若潰出黃水則又為濕熱矣更宜於東垣方論求之祕傳痔漏隔礬灸法皂礬一斤用新瓦一片兩頭用泥作一罈先以香油刷瓦上焙乾卻以皂礬置瓦上煆枯為末穿山甲一錢入紫罐內煆存性為末木鱉子亦如前法煆過取末二錢五分乳香沒藥各一錢五分另研上藥和勻冷水調量大小作餅子貼瘡上用艾炷灸三四壯灸畢就用熏洗藥先熏後洗日六三五日後如前法再灸以瘥為度熏洗方皂礬如前制過約手規二把知母末一兩貝母末一兩蔥七莖先用水煎蔥三四沸傾入瓶內再入煎藥令患者坐瓶口上熏之待水溫傾一半洗患處留一半俟再灸復熱熏洗以瘥為度一脫肛症久利産婦小兒老人多有此疾産婦用力過度久利氣血下陷小兒氣血未充老人氣血已衰故肛易出不得約束禁固也肛門為大腸之候肺與大腸相為表裡肺臟蘊熱則閉氣虛則脫當審其因以治之二陰症治夢遺精滑鬼交春秋冬三時可灸膏肓腎俞灸隨年壯命門遺精不禁五壯立效白環俞中極三陰交中封然谷三里關元氣海大赫精宮丹田失精膝腫冷痛曲泉白濁脾俞小腸俞氣海章門開元中極精冷無子腎俞淋痛列缺中封膈俞肝俞脾俞腎俞氣海石門血淋間使能攝心包之血三陰交勞淋復溜血淋湧泉血淋尿血精出列缺遺尿偏墜少府少便不通利三焦俞小腸俞三陰交中極兼腹痛中封太衝至陰大小便不通大腸俞膀胱俞大便祕結腹中積痛章門巨闕太白支溝照海大都神關即臍中用包豆為餅填入臍中灸三五壯小便失禁氣海兼小兒遺尿關元陰陵泉大敦行間大腸下氣百會胞痹小腹膀胱按之內痛若沃以湯澀於小便上為清涕脈宜大而實忌虛小而澀三陰交疝氣大敦肩井㿗疝章門氣海歸來衝門關元主㿗疝偏大灸百壯帶脈會陰三陰交肝脾大溪寒疝太衝隱白脾疝承漿築賓湧泉然谷水道陷谷曲泉㿉疝足大指爪甲穴並足合兩拇指爪甲以一艾炷灸兩爪端方角上七壯治㿗疝陰腫大效手小指端治㿗疝灸七壯左灸右右灸左足大指本節間治㿗卵疝氣灸三壯足大指內側去端一寸白肉際灸隨年壯甚驗若雙㿗灸兩處陰腫欲潰灸足大拇指本節橫紋中五壯一云隨年壯闌門在陰莖根兩旁各開三寸灸二七壯治木腎偏墜一法於關元旁相去各三寸青脈上灸七壯一法令病人合口以草橫量兩口角為一摺照此再加二摺共為三摺屈成三角如樣以上角安臍中心兩角安臍下兩旁當兩角處是穴左患灸右右患灸左左右俱患即兩穴俱灸艾炷如麥粒十四壯或三七壯即安陰痿命門腎俞氣海然谷陽谷陰挺曲泉太衝然谷照海陰縮中封莖中痛列缺行間陰陵泉痔漏命門腎俞長強五痔便血最效灸隨年壯三陰痔血承山久痔陽谷太白凡痔疾腫大熱甚者先以槐柳枝煎湯乘熱熏洗過後用壯盛男子篦下頭垢捏成小餅約厚一分置痔上又切獨蒜片厚如錢者置垢上用艾灸二七壯或三七壯無不消散又法單用生薑切薄片放痔痛處用艾炷於薑上灸三壯黃水即出自消散矣若有二三個者依前逐個灸之神效脫肛百會三壯此屬督脈居巔頂為陽脈之都綱統一身之陽氣凡脫肛皆因陽氣下陷經云下者舉之故當藉火力以提之則脾氣可升而門戶固矣小兒亦然胃俞長強又有洞瀉寒中脫肛者灸水分百壯內服溫補藥自愈少腹外腎痛丘墟婦人症略婦人之病與男子同惟調經種子胎前産後與男子異其同者已具見於各條其異者自當別為表著易曰一陰一陽之謂道乾道成男坤道成女男秉乾道之陽其性剛而明女秉坤道之陰其性柔而晦故其生病也大半由於七情鬱結中氣不能舒暢氣不舒則血遂不能循行無滯氣血交病因致月事失常崩帶癥瘕之病作衝任之脈有傷生化之機日薄是故苗而不秀秀而不實甚至終身不孕者有之而且積憂生熱積熱生痰延及虛勞者有之沈謐云婦人女子之病常浮於男子什九其喜怒哀樂發而中節者寡欲診問而識所因蓋亦難矣經曰怒則氣上喜則氣緩悲則氣消恐則氣下寒則氣收熱則氣泄驚則氣亂勞則氣耗思則氣結九氣不同百病皆生於氣女子善懷氣病為多氣病而血未有不病者今特取婦科之要者數則詳述於後一月經不調血結經閉岐伯曰女子二七腎氣盛齒更髮長而天癸至任脈通太衝脈盛月事以時下月者以三旬一見以象月盈則虧也經常也行有常期而不失其候也內經曰飲食入胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行東垣先生所謂脾為生化之源心統諸經之血誠哉是言也竊謂心脾和平則經候如常苟或七情內傷六淫外侵飲食失節起居失宜脾胃虛損心火妄動則月經不調矣如經行頭暈肝傷風動也經乃欲行腹中絞痛者血澀也夫經水陰血也屬衝任二脈上為乳汁下為月水內經云二陽之病發心脾有不得隱曲故女子不月其傳為風消又曰月事不來者胞脈閉也薜立齋云女子不月有因脾虛而不能生血者有因脾郁傷而血耗損者有因胃火而血消爍者有因脾胃損而血少者有因勞傷心而血少者有因怒傷肝而血少者有因腎水不能生肝而血少者有因肺氣虛不能行血而閉者治宜察脈辨症各隨其所因而調之經所謂損其肺者益其氣損其心者調其營衛損其脾者調其飲食適其寒溫損其肝者緩其中損其腎者益其精是也一婦人血崩症狀非一所感亦異經曰陰虛陽搏謂之崩又云陽絡傷則血外溢陰絡傷則血內溢産實分陰崩陽崩受熱而赤謂之陽崩受冷而白謂之陰崩薛氏云有因脾胃虛損不能攝血歸源或因肝經有火血得熱而下行或因肝經有風血得風而妄行或因怒動肝火血熱而沸騰或因脾經鬱結血傷而不歸經或因悲哀太過胞絡傷而下崩治療之法當各隨其經之所病東垣丹溪諸先生云凡下血症須用四君子以收功斯言厥有旨哉一淋帶赤白經曰任脈為病男子內結七疝女子帶下瘕聚又曰脾傳之腎名曰疝瘕小腸冤結而痛出白一名曰蠱所以為帶下冤結也産寶帶下三十六疾乃十二癥九痛七害五傷三固謂之三十六病也陳自明云婦人帶下其名有五因經行産後風邪入胞門傳於臟腑而致之肝病色如青泥心病色如紅津肺病形如白涕脾病形如爛瓜腎病黑如衃血人有帶脈橫於腰間病生於此故名為帶然亦不全拘於帶脈徐用誠先生云白屬氣赤屬血東垣先生云血崩久則亡陽故白滑之物下流亦有濕痰流注下焦或腎肝陰淫之濕勝或驚恐而木乘土位濁液下流或思慕為筋痿症之所受不同而治亦各異也崔氏四花穴治赤白帶如神撮要取中極白環俞各灸十五壯腎俞灸隨年壯海藏謂帶病太陰主之灸章門穴麥粒大各三壯神效一婦人癥瘕多屬血病癥者堅也堅則難破瘕者假也假物成形古人有五積六聚七癥八瘕之名內外所感不同治法亦當以類相從蠱者蟲病也血病也雖內外所感其積於腹中與藏氣搏結乃成龍蛇魚鱉等物自有活性故名曰蠱非鼓脹無物空空之謂也當須識此經雲氣主噓之血主濡之若血不流積凝而為瘕也瘕者中雖硬而忽聚忽散多因六淫七情飲食起居動傷臟腑而成當與痃癖諸症同治慎勿妄傷元氣一婦人不孕多因七情所傷致使血衰氣盛經水不調或前或後或多或少或色淡如水或紫如血塊或崩漏帶下或肚腹疼痛或子宮虛冷皆不能受孕經云沖為血海任主胞胎二經受病其在女子為不孕故凡女子之孕育以血為主血不能自生而又以氣為主欲求種子之法亦惟以培補命門顧惜陽氣清心寡欲使氣血充和不求子而得子乃天地自然之道也一婦人屢墮胎者必以氣脈虧損而然而虧損之由有稟質之素弱者有年力之衰殘者有憂怒勞苦而困其精力者有色欲不慎而盜損其生氣者此外如跌撲飲食之類皆能傷其氣脈氣脈有傷而胎可無恙者非先天最完固者不能而常人則未之有也且懷胎十月經養各有所主一月形如露珠乃太極動而生陽天一生水謂之胚足厥陰肝脈主之經水即閉飲食稍異二月如桃花瓣乃太極靜而生陰地二生火謂之脹足少陽膽脈主之若吐逆思食名曰惡阻有孕明矣或偏嗜一物一臟之虛如愛酸物乃肝經只能養胎而虛也三月如清涕先成鼻與雌雄二器乃分男女手厥陰心胞相火所主胎最易動四月始受水精以成血脈形象手足順成手少陽三焦脈所主五月始受火精筋骨四肢已具毛髮始生足太陰脾脈所主六月始受金精以成筋耳目皆成足陽明胃脈所主七月始受木精以成骨遊其魂能動左手手太陰肺脈所主八月始受土精以成皮膚九竅皆成遊其魄能動右手手陽明大腸脈所主九月始受石精百節畢備三轉其身足少陰腎脈所主十月神氣備足乃足太陽膀胱脈所主惟手少陰太陽無所主者專主之官無為而已凡墮胎多在三五七月必當審察所由而預防之一胎漏有母氣壯盛蔭胎有餘而血之溢者此不必治有殳氣薄弱胎有不能全受而血之漏者此胎陽本虧而生子必萎小當助其胎不必治其漏他如怒動肝火脾虛不能攝血或血熱氣滯或脾腎兼虛三焦氣血俱虛或勞倦傷而動血或偶因傷觸動血或衝任氣虛不能約制血滑易動者病各有所主也一婦人轉脬由脬為熱所逼或忍小便俱令水氣迫於脬屈闢不得充張外水應入不得入內溲應出不得出內外壅滯脹滿不通故為脬轉其狀少陰急痛不得小便甚者至死不可治妊娠轉胞者因胎長逼迫於胞胞為所逼而側令人數溲胞即膀胱也轉胞與子淋不同小便頻數點滴而痛為子淋頻數出少而不痛為轉胞間有微痛終與淋異一産難橫生以兒方轉身産母用力逼之太早故致兒身未順而先露手臂但令母安然仰臥穩婆以手徐推兒臂下體令其正直復以中指摸其肩弗使臍帶攀系即生一法令産母仰臥以小針刺兒手腳心三五次用鹽擦之手腳即縮上轉身而生一産後諸症多屬於虛然亦有不虛者有全實者不可因丹溪之論執一不化陳自明云産後惡露不止因傷經血或內有冷氣而臟腑不調故也薛立齋云有肝氣熱而不能主血者有肝虛不能藏血者有脾虛不攝血胃氣下陷不能統血脾經鬱熱而血不歸源怒動肝火而血妄行肝經風邪而血沸騰又有氣血俱虛者治勿拘泥又如産後昏暈古人多雲惡露乘虛上攻不知此症有二一日氣脫因産時去血過多眼閉口開手冷六脈微細是也一日血暈本由氣血所致然亦有血壅痰盛形氣脈氣皆有餘胸腹脹痛上衝此血逆症也若胞衣不下亦有二端一因氣血虛弱不能傳送而別無痛脹但助其氣血即下一因血入胞中脹大而不能下以致心腹脹痛喘急急宜用藥散血消脹胎衣自下又法以本婦頭髮攪入喉中使之作嘔則氣升血散胞軟亦自落矣一婦人乳疾乳汁乃衝任氣血所化故下則為經上則為乳若産後無乳由於氣血之不足或肥胖婦人痰氣壅盛乳滯不行乳腫者因兒吮乳為口氣所吹致令乳汁不通壅結腫痛不急治之多成癰腫謂之吹乳或因無兒飲乳或兒弱飲少余乳蓄結作脹或婦人血氣方盛乳房作脹以致腫痛憎寒壯熱不吮通之必致成癰乳癰一症屬膽胃二府熱毒氣血壅滯故初起腫痛發於肌表或發寒熱或憎寒頭痛煩渴引冷至數日之間膿成潰竅稠膿湧出膿盡則愈若氣血虛弱久不收斂則難治一婦人陰挺是因胞絡傷損或因分娩過勞或因鬱熱下墜或因氣虛下脫陰中突出如菌如芝或挺出數寸癢痛牽引腰腹大都房室過度淫欲不遂多致此症治以升補固陰為主又婦人夜夢顛倒與鬼交通由於臟腑空虛陽神不守故鬼氣得以乘之其狀不欲見人如有晤對時獨言笑或時悲泣是也又婦人遺尿乃心腎之氣傳送失度之所為也故有小便澀而流者有失禁而出不自知者有産理不順致傷膀胱遺尿無時又有胞寒藏冷而遺尿不禁治宜審察勿損真陰此皆婦人之病之大略也婦科症治血結月事不調氣海中極照海經閉腰俞照海血崩不止膈俞肝俞腎俞命門氣海中極下元虛冷白濁間使血海復溜行間陰谷通里淋帶赤白腎俞血海帶脈中封三陰交中極白帶氣海腎俞命門神闕身交在少腹下橫紋中交儀在內踝上五寸營池四穴在內踝前後兩邊池上脈漏陰在內踝下五分微動脈上癥瘕胃俞脾俞氣海天樞行間三焦俞腎俞子宮子戶中極會陰復溜不孕三陰交血海氣海命門腎俞中極關元陰廉然谷照海胞門在關元左邊二寸子藏門塞不受精妊娠不成氣門在關元旁三寸一法灸神闕先以淨干鹽填臍中灸七壯後去鹽換川椒二十一粒上以薑片蓋定又灸十四壯灸畢即用膏貼之艾炷須如指大長五六分許胎屢墮命門腎俞中極交信然谷産難橫生三陰交合谷一治橫逆難産危在頃刻符藥不靈者灸至陰穴三壯炷如小麥下火立産其效如神穴在右腳小指爪甲外側尖上産後惡露不止中極産後無乳前谷胎漏下血氣門穴在關元旁三寸灸各百壯轉胞腰痛十七椎穴灸五十壯欲絶産臍下二寸三分灸三壯或至七七壯即終身絶孕欲取胎肩井合谷三陰交産後血暈支溝乳癰膺腫乳根乳腫少澤臨泣行經頭暈少腹痛內庭婦人蠱病公孫氣蠱太溪水蠱行間血蠱內庭食蠱陰挺癢痛少府曲泉繞臍㽱痛氣海關元胞衣不下三陰交此穴同合谷針之下胎最速崑崙婦人遺尿橫骨當陰門灸七壯夜夢交感三陰交灸五壯男女同治小兒症略病之最難治者莫如小兒小兒口不能言古人謂之啞科凡一切疾痛疴癢莫由達之醫人醫者以意消息其表裡虛實則誠有難然者也然最易治者亦莫如小兒小兒臟腑雖脆弱固易受病卻是一片天真之氣全無七情六欲其中病也必先見於形色觀色之晦明即可知其寒熱又必發於聲音審其聲之宏細即可知其虛實又水鏡訣有三關脈辨色以驗五臟醫者心誠求之果能得其虛實取效甚速此又治之易易也錢仲陽小兒脈訣云弦急氣不和沉緩為傷食促急是虛驚風浮冷沉細消息得其端脈亂者不治又全幼心鑑有按眉端法介賓以強弱緩急四脈驗小兒病最為得要思其難以圖其易則難者不難視為易不識其難則易者不易常見世俗時醫執守數方以為的將小兒之病以作射的之矢其中我力也不中爾命也嗟乎何其輕嘗淺試忍心夭折一至於此吳中葉氏有諷切之言謂近時俗醫所用藥餌不分氣血陰陽初則疏散繼為清解未從消導盡此不效別無方法託言服藥已疲且緩藥數日待其自愈倘有變症希企掩飾而已更有病家延集多醫以為合謀商酌必然穩安不知築室道旁雜無成見內有稍通道者主立一方衆醫傳視僉曰正合吾意或加一味或減一味虛應在事之情逮藥不中病群相推諉或僥幸成功各誇己能並不識在經在絡湯藥亂投即病家亦不知誰咎誰功妄加譭譽此等風氣開自庸醫富室而醫事幾為若輩壞矣豫亦有醫願數則附録於後以明醫道實為軀命所關絲毫不可率略而小兒尤必加謹焉一驚風有急慢二症急驚之候壯熱痰壅竄視反張搐搦顫動牙關緊急口中氣熱頰赤唇紅飲冷便結脈浮洪數此肝邪有餘而風生熱熱生痰痰熱客於心膈間則風火相搏故其形症急暴陽症也實症也當先治其標後治其本慢驚之候多由吐瀉因致氣微神緩昏睡露睛痰鳴氣促驚跳搐搦或乍發乍靜或身涼身熱或肢體逆冷或眉唇青赤面色淡白但其脈遲緩或見細數此脾肺氣虛肝邪無制因而侮脾生風故其形氣病氣俱不足陰症也虛症也當專顧脾胃以救元氣若慢脾之症由慢驚之後吐瀉損脾面赤額汗舌短頭低眼合不開睡中搖頭吐舌頻嘔腥臭噤口咬牙床手足微搐或身冷或身溫或四肢冷脈沉微此病傳已極總歸虛處惟脾所受若逐風無風可逐療驚無驚可療於此不審其因泛用祛風化痰之劑則促其危矣又撮口臍風由胎中受熱或初生不慎風寒遂致聚唇撮口眼閉口噤啼聲如鴉或聲不能出或舌上如粟或口吐白沫或痰鳴氣喘甚者舌強面青腹脹青筋吊腸牽痛七日內病者百無一生百日內病甚者亦多不治若因風動入臍或冷氣傳於脾絡以致前症者口內有小泡急掐破去其毒水以艾灸臍中亦有得生者治法多端無如灸法神妙一龜背者因小兒初生客風吹脊入於骨髓小兒元氣未充腠理不密易為風邪所乘或痰飲蘊結風熱交攻亦致此症雞胸者由肺熱脹滿攻於胸膈或乳母多食五辛熱物及兒食宿乳而成錢仲陽云肺主氣實則悶亂壅迫干胸間乃成雞胸之症一小兒羸瘦肚大多屬疳症如手足極細項小骨高尻削體痿腹大臍突號哭胸陷是為丁奚如虛熱往來頭骨分開翻食吐蟲煩渴嘔噦是為哺露又腦後項邊有如彈丸按之轉動軟而不痛其內有蟲不速針出則內食臟腑肢體癰疽便利膿血壯熱羸瘦頭露骨高是為無辜疳若見白膜遮睛或瀉血而瘦此為肝疳又名筋疳亦名風疳錢仲陽云小兒諸疳皆因脾胃虧損內亡津液虛火妄動或乳母六淫七情飲食起居失宜致兒為患又因食積腹大多緣脾胃陽氣不足虛寒作脹東垣云寒脹多熱脹少若脾胃不虛則運化以時何致腹膨脹大此崇本之論非一家言也一泄瀉霍亂由於六淫外侵調護失常乳食不節有冷有熱有食積三者之不同也冷者脾胃虛寒水穀不化小便白而大便青或如糟粕手足厥冷或兼外感風寒內傷生冷身體乍涼乍熱面黑氣喘者不治熱者脾胃有濕大便黃而小便赤口乾煩渴四肢溫暖亦有兼暑受熱而作吐瀉者若唇深紅內熱大甚不退者不治食積者因傷食過度脾胃積滯腹脹發熱吐如酸醋氣瀉如敗卵臭此其候也總之吐瀉不止臟氣日衰多成慢驚之症可不慎乎若霍亂與吐瀉又稍有不同霍亂之來暴而疾吐瀉之症徐而緩或以寒涼傷胃或犯時氣陰濕或因飲食失宜皆能致之醫者當此緊要關頭不可無定見一小兒夜啼有脾寒有心熱如夜屬陰陰勝則脾藏之寒愈威脾為至陰喜溫而惡寒寒則腹中作痛故曲腰而啼其候面青白手腹俱冷不思乳食是為脾寒亦曰胎寒若見燈愈啼者心熱也心屬火見燈則煩熱內生兩陽相搏故仰身而啼其候面赤手腹俱暖口中氣熱是也究其所自多由心氣之不足或觸犯禁忌狀若鬼崇者亦有之一小兒心脾有熱舌下有形如小舌者名曰重舌舌腫硬不柔和者名木舌若舌下有紫脈牽絆不語啼哭名絆舌用布針刺脈上數針即愈一小兒語遲錢氏云心之聲為言小兒數歲不語由妊母卒有驚動邪乘兒心致心氣不足故不能言也有稟父腎氣不足者有乳母五火遺熱閉塞氣道者有病後津液內亡會厭乾涸者亦有脾胃虛弱清氣不升而言遲者宜隨經用治一小兒口轉屎氣經云受谷者濁受氣者清清者注陰濁者注陽清者上出於肺濁者下出於胃清濁相干命曰亂氣故宜上者反下宜下者反上此不獨小兒為然凡肺胃傷冷陰陽淆亂者多致此病小兒臟腑脆弱宜溫而不宜寒若乳母喜食寒涼寒氣流入乳中小兒吮食不得下化並胃中積濁轉逆而作屎氣非若胃熱口臭之沖人鼻也一陰腫疝氣多由寒邪所郁陰囊偏墜腫痛不可忍或小腹痛引腰脊攣曲身不能直卒然腫痛或坐地多時或邪氣外襲亦有為蟲蟻吹者皆得以致此一癲癇病錢仲陽云小兒發癇因血氣未充神氣未實或為風邪所傷或為驚怪所觸亦有娠妊七情驚怖所致如面赤目瞪吐舌齧唇心煩氣短其聲如羊者曰心癇面青唇青兩目上竄手足攣掣反折其聲如犬者曰肝癇面黑目振吐涎沫形體如尸其聲如豬者曰腎癇面如枯骨目白反視驚跳反折搖頭吐沫其聲如雞者曰肺癇面色痿黃目直腹滿自利四肢不收其聲如牛者曰脾癇凡有此症先宜看耳後高骨間先有青脈紋抓破出血可免其患此皆元氣不足之症也又有驚癇心神恍惚或語言鬼神喜笑不休有風癇怵惕怔忡痰涎泄瀉有食癇脾土虛弱飲食停滯夜多漩溺若眼直目牽口噤涎流肚膨筋搐背項反張腰脊強徑形如死狀終日不醒則為瘥矣一痞氣在腸胃之外膈膜之間非可以消伐推蕩而去總由飲食不節脾胃傳化不及則胃絡所出之道漸有留滯日以益大因成痞矣或感寒發熱熱後胃氣未清不自知戒口腹則食以邪留最易成痞治此者不識從胃氣推求則痞未消而元氣已憊矣瘈者筋脈拘急瘲者筋脈張縱也素問云心脈急甚者瘛瘲脾脈急甚者亦為瘛瘲靈樞云心脈滿大癇瘈筋攣肝脈小急亦癇瘈筋攣有風熱有虛寒經云肝主筋而藏血血虧陽火熾盛筋無所養多致此病營分因寒傷筋為拘急小兒吐瀉後脾胃虧損與夫陽氣脫陷者亦多患之人有忽得癡呆者失志之病也憂思過甚志不能轉移心神因之失守心胞之絡氣結痰凝故冥頑不靈又有夢魘鬼擊者由於心志不交心藏神腎藏志人寐納氣於腎腎有所恐則精卻卻則上焦閉閉則肝之魂肺之魄化變百出而為邪魘鬼擊氣不得升呼不得出甚則一夜數發虛人小兒多有之靈樞淫邪發夢篇可參考焉一癲狂風癇五痙瘛瘲各有不同難經曰重陰者顛重陽者狂狂為痰火實甚顛為心血不足脈經曰陰附陽則狂陽附陰則顛顛者或狂或愚或歌或笑或悲或泣如醉如癡言語有頭無尾穢潔不知積年纍月不愈俗呼心風此志願高大而不遂所欲者多有之狂者病發之時猖狂剛暴如傷寒陽明大實發狂罵詈不避親疏甚者登高而歌棄衣而走逾垣上屋非力所能或與人語所未常見之事如有邪依附者是也風癇者由熱甚而風燥發則昏不知人眩仆倒地不省高下甚而瘛瘲抽掣目上視或口目喎邪或口作六畜之聲時發時止與痙病相似然痙病身強直反張如弓不如癇之身軟也夫痙者即後人誤為痓病也仲景云身熱足寒頸項強急惡寒時頭熱面赤目赤獨頭動搖卒口噤背反張者是也太陽病發熱無汗反惡寒者名曰剛痙太陽病發熱汗出名曰柔痙所謂剛痙者為中風發熱重感於寒而得之所謂柔痙者為太陽發熱重感於濕而得之後人方論乃以無汗為表實有汗為表虛不思濕勝者自多汗出治者誤為表虛而行溫補能不重增大筋之熱歟一雀盲晝視通明夜視罔見因稟陽氣衰弱遇夜陰盛則陽愈衰故不能見物也一口噤不吮乳因初生試口不淨惡穢入腹則令腹滿氣短不能吮乳或為風寒所侵眼閉口噤啼聲漸小或不能出聲或口吐白沫或唇緊撮口或吼氣喘急喉痰潮響甚者舌強面青腹脹青筋吊腸牽痛百日內病甚者多不治一小兒脫肛瀉血巢氏雲實熱則大便閉結虛寒則肛門脫出多因吐瀉脾氣虛肺無所養故大腸之氣虛脫而下陷又脾胃有傷營衛虛弱諸經之血行失常道故下為瀉血若臟腑撮痛亦主於脾胃經云痛者陰也又曰痛者寒氣多也雖謂多由積滯然脾胃不虛則運化以時何有積滯若胃氣無傷而腹中和暖則必無留滯作痛是痛者多由乎虛寒也小兒症治急慢驚風百會水溝合谷大敦行間囟會上星率谷尺澤慢驚間使太衝印堂灸三壯炷如小麥撮口臍風然谷一法以艾小炷隔蒜灸臍中俟口中覺有艾氣即效凡臍風症必有青筋一道自下上行至腹而生兩岔即灸青筋之頭三壯若見兩岔即灸兩處筋頭各三壯十治五六否則上行攻心不救慢脾風脾俞龜背肺俞雞胸乳根羸瘦骨立百勞胃俞腰俞長強食積肚大脾俞胃俞腎俞泄瀉胃俞水分天樞神闕腹痛乳利甚妙霍亂水分轉筋外踝尖上三壯夜啼心氣不足中衝疳眼合谷重舌行間氣弱數歲不語心俞口中轉屎氣因母食寒涼所致中脘灸九壯大人十四壯陰腫崑崙疝氣會陰大敦五癇先怖恐啼叫乃發前頂灸頂上旋毛中炷如麥大三壯及耳後青絡脈長強囟會巨闕章門天井內關少衝風癇先出手指如數物狀乃發也灸髮際宛宛中三壯神庭治吐舌角弓反張豬癇病如尸厥口吐青沫作豬聲巨闕灸三壯百會神門羊癇目瞪舌吐作羊聲百會神庭心俞肝俞天井神門太衝馬癇張口搖頭身反折作馬鳴百會心俞命門神門僕參太衝照海牛癇善驚反折手掣手搖大杼鳩尾尖下五分灸三壯不可多雞癇張手前僕提住即醒申脈驚癇如狂灸炷如小麥大三壯金門僕參崑崙神門解溪痞氣中脘章門臍後脊中七壯雀目夜不見物灸手大指甲後一寸內廉橫紋頭白肉際各一炷如小麥大口噤不吮乳初生七日內得此症是客風中臍循流至心脾二經遂使舌強唇撮承漿穴在唇稜下宛宛中頰車穴在耳下曲頰骨後以上二穴各灸七壯唇緊灸虎口男左女右七壯又兼承漿三壯吼氣灸無名指頭二壯脫肛瀉血臟腑撮痛不可忍灸百會二壯外科症略夫人之有生死主於氣血榮枯人之有疾病由於氣血之失其常度故癰疽之發或由氣熱傷血或由血熱傷氣總之經絡阻隔血氣凝結然亦有陰症陽症表裡虛實之不同經云五臟菀熱癰發六腑又云六腑不和留結為癰又云諸痛癢瘡皆屬於心肺乘肝則為癰腎移寒於肝癰腫少氣脾移寒於肝癰腫筋攣此皆臟腑之變又不專主於熱專屬於外也集驗云癰疽之名雖有二十餘症而其要有二陰陽而已發於陽者為癰為熱為實發干陰者為疽為冷為虛故陽發則皮薄色赤腫高多有椒眼數十而痛陰發則皮厚色淡腫硬如牛頸之皮而不痛又有陽中之陰似熱而非熱雖腫而實虛若赤而不燥欲痛而無膿既浮而復消外盛而肉腐陰中之陽似冷而非冷不腫而實赤微而燥有膿而痛外雖不盛而內實煩悶陽中之陰其人多肥肉緊而內虛陰中之陽其人多瘦肉緩而內實而又有陽變而為陰者草醫涼劑之過也陰變而為陽者大方熱藥之驟也然陽變陰者其症多猶可返於陽故多生陰症變陽者其症少不能復為陰矣故多死然間有生者此醫偶合於法百中得一耳薛立齋云癰疽有五善七惡飲食如常動息自安一善也便利調勻或微見乾澀二善也膿潰腫消水漿不臭內外相應三善也神彩精明語聲清亮肌肉好惡分明四善也體氣和平病藥相應五善也七惡者煩躁時嗽腹痛渴甚眼角向鼻瀉利無度小便如淋一惡也氣息綿綿脈病相反膿血既泄焮腫尤甚膿色臭敗痛不可近二惡也目視不正黑暗緊小白暗青赤瞳子上視晴明肉陷三惡也喘粗短氣恍惚嗜臥面青唇黑便汙未潰肉黑而陷四惡也肩背不便四肢沉重已潰青黑筋腐骨黑五惡也不能下食服藥而嘔食不知味發痰嘔吐氣噎痞塞身冷自汗耳聾驚悸語言顛倒六惡也聲嘶色敗唇鼻青赤面目四肢浮腫七惡也症見五善病在腑者輕症見七惡病在臟者危凡五善之中見一二善症瘡可治也七惡之內忽見一二惡症宜深懼之太抵虛中見惡症者不可救實症無惡候者自愈臨症之時最宜詳細明察須分經絡部分血氣多少腧穴遠近有宜內治者有宜外治者元戎云自外而入者不宜灸自內而出者宜灸外入者托之而不內內出者接之而令外故經云陷者灸之灸乃從治之意凡瘡瘍初起七日以前即用灸法大能破結化堅引毒外出移深就淺功效勝於藥力惟頭為諸陽所聚艾炷宜小而少若少陽分野尤不可灸灸之多致不救亦有因灸而死者蓋虛甚孤陽將絶其脈必浮數而大且鼓精神必短而昏無以抵當火氣宜其危也又精要云腦為諸陽之會頸項近咽喉腎俞為致命之所俱不可灼艾苟不知宜忌一概混施非徒無益而反害之瘍醫雖屬外科然其觀色脈辨陰陽晰經絡分虛實未有不精乎內而能明乎外者也外科症治一切瘡毒大痛或不痛或麻木如痛者灸至不痛不痛者灸至痛其毒隨火而散此從治之法也有回生之功法用大蒜頭去皮切三文錢厚安瘡上用艾炷於蒜上灸之三壯換蒜復灸未成者即消已成者亦殺其大勢不能為害如瘡大用蒜搗爛攤患處將艾鋪上燒之蒜敗再換如不痛不起發不作膿或陰毒尤宜多灸而仍不痛不起發不作膿者不治此氣血大虛之候也發背心俞委陽一曰在尻臀下一寸六分大腿上有縫騎竹馬灸法主治一切癰疽惡瘡發背婦人乳癰法用薄篾一條以男左女右手臂腕中自尺澤穴橫紋量起至中指端盡處截斷為則卻用竹扛一條令病者脫去上衣正身騎定使兩人前後扛起令病人腳不著地仍令二人扶之勿使傴僂搖動卻將前所量篾從竹扛坐處尾骶骨下著扛量起貼脊直上至篾盡處用墨點記此非灸穴更用薄篾量手中指同身寸二寸平於脊中墨點處各開一寸是穴灸五七壯一曰疽發於左則灸右發右則灸左甚則左右皆灸蓋此二穴乃心脈所過之處凡癰疽皆心火留滯之毒灸此則心火流通而毒散矣起死回生之功屢試屢效左右搭手兼灸會陽腦頂後疽一名天疽俗名對口男左女右腳中指下俯面第三紋正中用蘄艾灸七壯乳癰疽岩乳氣乳毒侵囊近膻中者是肩髃靈道溫溜小人七壯大人二七壯足三里條口乳癰下巨虛各二七壯肺癰膻中肺俞支溝大陵腎俞合谷大淵項上偏枕風門灸二七壯玉枕發生腦後髮際中腫起引鼻閉塞風府穴在項後入髮際一寸灸三七壯項疽生於項中當脊不能回顧天宗在肩胛骨下有陷處灸七壯疔瘡用大蒜爛搗成膏塗疔四圍留瘡頂以艾炷灸之以爆為度如不爆難愈宜多灸至百餘壯無不愈者鼻疔生於鼻內痛引腦門不有運氣牙閉不開鼻大如瓶色黑者不治腕骨穴在掌末側陷中灸七壯炷如緑豆大黑疔生耳中赤腫連腮後溪穴在手小指外側本節後捏拳橫紋盡處灸七壯頰疔生面頰骨尖高處發時寒戰咬牙口不能開外關注節疔生指節縫中腫痛連肘臂合骨合疔一名虎口發有小黑泡起大指節尾中內關間使鬢疽伏兔唇疽犢鼻牙疽外踝尖上灸三壯炷如緑豆大瘰疽生耳下半寸形如雞子膿長流經年不瘥天井穴在肘外一寸灸三七壯透腦疽生當鼻上如雞子堅硬按痛連心中都對口疽生項後神門虎口疽生承漿內後頂發疽生當背脊外兩旁堅赤而腫近膏肓穴心俞背疽症不一有背氣發蓮子發荷葉發脊發當觀其色赤腫痛易治又須得月令生身則吉春黃夏黑不治如得月令急以騎竹馬法灸之須服乳香托裡散緑豆粉一兩乳香五錢研細甘草浸湯調下二錢專托毒氣不使入心再用國老膏大粉草五兩銼細用長流水浸一宿慢火瓷器內濃煎去滓再煎如飴糖每服一二匙用無灰酒調下候利為度良久焮腫漸漸消去視其漸消第三日便安矣但灸瘡焮發異常內如蟲行形狀流出清水四五日方定仍服五香連翹飲沉香木香丁香乳香另研連翹升麻射干木通生黃耆大黃略炒粉草獨活五錢麝香二分桑寄生一錢五分共十四味除麝香一味余皆入銀器內煎好再下麝香和勻溫服能疏散郁毒之氣救膜護心丸白礬一兩生研黃蠟五錢溶化入礬和勻急手丸如梧子大每服十丸或米飲或酒下未破皆效此表裡內外相須調治大可活人功效匪淺腎疽生十四椎兩旁合陽附骨疽生腳外魚肚上一云環跳穴痛恐生附骨疽也大陵懸鐘崑崙兌疽生臂上兌肉端神門穿骨症生手掌後三寸兩筋間大如雞子堅如石按痛至骨神門樂疽生臂內堅如鵝子按之痛徹骨時惡寒腋門髎疽發於肩腋相連腫會宗魚肚疽一名蛇頭疔發於手中指中節令人寒戰咬牙合谷心疽當心兩乳之中先熱後寒赤腫引背痛陰谷咬骨疽生於里股無形作痛蓋毒氣在骨中所發陰包在膝上四寸兩筋中灸三七壯痃疽生陰器之右連陰子腫者痛引兩脅蟊溝坐馬疽生陰前後中間在右名下馬癰在左名上馬癰在內尖頭者名鸛口疽用前隔蒜灸法宜先服護心散以防火氣入內淵疽發於肋下一竅有聲如嬰兒泣用膏藥或紙貼之則不能出聲陽陵泉腿骨疽發於大腿之側痛甚徹骨皮膚不腫不赤絶骨陰疽在內股其形長闊二寸許下易治上難治其色微赤痛甚曲膝不能屈伸商邱腹疽生於臍下橫而微腫痛甚牽引脊背箕門穿踝疽生內踝骨中發腫內外痛甚不能行動隱白魚口疽發於少腹之下腿根之上摺紋縫中一名便毒又名血疝隱白喉癰生咽喉之下赤腫連喉痛甚不能飲食少衝臑癰生臂上連肩青腫長而堅者少海肘癰生肘尖上不能舒伸令人肩背痛間使石榴癰發於臂上各經俱有先腫後皮翻開無法可治惟用菊花湯洗淨又用菊花燒灰同輕粉和勻敷之天井胸癰生兩乳中上二寸其症頭痛心虛體倦其色赤腫郤門脅癰發於右脅下長五寸許闊三寸微腫寒戰小腹痛衝門氣癰生胸間乳上三寸赤腫痛甚靈道赫癰生臍旁大如瓜凸出如癭瘤陰谷築賓胃癰生於左者名胃口疽生於右者名胃口癰曲池內關腎癰自腎俞穴起會陽幽癰生臍下五寸大如鵝子令人寒戰咬牙痛連兩脅築賓褲襠癰生於陰器之底近肛邊陰子腫赤痛連腰背三陰交手背癰中渚瘰癧間使灸五壯左灸右右灸左外關灸三壯結核同治天井灸五壯內服養營湯其癧自消惟一二個不消者用癩蝦蟆一個剝去皮蓋瘰癧上用艾灸七壯立消蜂窠癧自左邊起竅皆出膿肩髃曲池此二穴乃治癧之祕法也天池天井三間錐鋭癧自右邊生起肩髃曲池天井盤蛇癧延頸生者肩尖即肩髃肘尖即曲池人迎肩外俞天井騎竹馬灸三七壯瓜藤癧胸前生者肘尖少海騎竹馬灸馬刀癧腋下生者淵腋支溝外關足臨泣頭腋俱治間使治生耳後入髮際微腫硬如石引頭痛灸二七壯凡瘰癧出於頰下及頰車邊者當於手足陽明經取穴治之然肩顒曲池二穴亦妙合谷足三里以上感毒深者灸後再二三報之隔蒜灸法用獨蒜片從後發核上灸起至初發母核而止多灸自效癭瘤男左灸十八壯右十七壯女左十八壯右十七壯天突治一切癭瘤初起者甚妙通天雲門臂臑曲池治血肉筋氣石耳後五癭中封治氣癭兼灸膻中七壯大椎頭癭風池氣舍臑會天府衝陽身面疒贅疣當疣上灸三壯即消亦有止灸一壯以水滴之自去癮疹曲池陽溪天井瘡疥風門間使合谷大陵胸前瘡疥侵腦在目鋭眥穴中發下一寸其症寒戰發熱雙目痛支正風眉生兩眉間長如生爪皮赤腫引兩目侵眉痛難忍陽谷馬口瘡生於鼻下腫痛大如馬刀郤門魚腮生耳下腮中發時連牙痛四瀆龍泉毒生人中內百會肩風生肩上青腫甚者痛連兩脅肩貞流注生起於缺盆穴氣復合於天樞穴梁邱氣痞生腹皮裡膜外狀如覆杯章門鶴膝風發於膝內股腫疼甚者見青筋引足心痛此症系二陰不足三陰交膝眼穴在膝下兩旁陷中腋氣凡腋氣先用快刀剃去腋毛乃用好定粉水調搽患處六七日後看腑下有一點黑者必有孔如針大或如簪腳即氣竅也用艾炷如米大灸三四壯永不再發毒瘡久不收口凡患癰疽潰後久不收口膿水不臭亦無死肉者此因消敗大過以致血氣虛寒不榮肌肉治失其宜便為終身之患須內服十全大補湯等藥外用大附子以溫水泡透切作二三分厚置漏孔上以艾灸之或以附子為末用唾和作餅灸之亦可隔二三日再報之不三五次自然肌肉長滿而宿患平矣黃蠟灸法先以濕面隨癰疽腫根作圈高寸余實貼皮上如井口形勿令滲漏圈外圍布數重防火氣烘膚圈內鋪蠟屑三四分厚次以銅漏杓盛桑木炭火懸蠟上烘之令蠟化至滾再添蠟屑隨添以井滿為度皮不痛者毒淺灸至知痛為度皮痛者毒深灸至不知痛為度去火杓即噴冷水少許於蠟上俟冷起蠟蠟底之色青黑此毒出之徵也如漫腫無頭者亦以濕紙試之於先干處灸之初起者一二次即消已成者二三次即潰不斂四圍頑硬者即於瘡口上灸之蠟從孔入愈深愈妙其頑腐瘀膿盡化收斂甚速豆豉餅灸法癰疽發背已潰未潰用江西淡豆豉為末量瘡大小黃酒合作餅厚三分置患處灸之餅乾再易一餅如已有瘡孔勿覆孔上四布豉餅列艾其上灸之使微熱勿令肉破如熱痛急易之日灸三度令瘡孔出汗即瘥蠐螬灸法疳瘻惡瘡諸藥不驗者取蠐螬剪去兩頭安瘡口上以艾灸之七壯一易不過七枚無不效者神燈照法方用硃砂雄黃血竭沒藥各二錢麝香四分共為細末每用三分紅綿紙裹藥搓捻長七寸麻油浸透用火點著離瘡半寸許自外而內周圍徐徐照之火頭向上藥氣入內毒氣隨火解散自不致內侵臟腑初用三根漸加至四五根候瘡勢漸消時仍照之但照後即用敷藥圍敷瘡根比瘡暈大二三分為率瘡口用萬應膏貼之如干及有膿用豬蹄湯潤洗之如已潰大膿瀉時不必用此照法惟初起七日前後即起發法能使未成者自消已成者自潰不起發者即起發不腐者即腐實有奇驗桑柴火烘法凡癰疽初起腫痛重若負石堅而不潰者用新桑樹根劈成條或桑木枝長九寸劈如指粗一頭燃著吹滅用火向患處烘片時火盡再換每次烘三四枝每日烘二三次以知熱腫潰肉腐為度此古法也但桑柴火力甚猛宜干未潰之先可以生髮陽氣速潰速腐若已潰之後或瘡口寒或天氣寒或肌肉生遲者亦須烘之使肌肉常暖法以桑木燒作紅炭以漏杓盛之懸患上自四圍烘至瘡口或高或低總以瘡知熱為度每日烘後再換敷貼之藥蓋肌肉遇暖則生潰後烘法亦瘍科所不可缺也硯丞醫願人之有生稟受五氣養以五味癥為五色發為五聲五者相得氣血和平五者一失疾疢乃生由外之內感於六氣由內之外敗於七情補偏救弊醫擅其名醫者意也以意消息貴得精詳在經在絡明辨陰陽診視真確始可立方勿期幸中淺試輕嘗兢兢業業謹志弗忘順逆偶失過責誰當綱古名醫洞見五臟剖腹湔腸極形無尚多出神奇理明義暢非謂萬病儘可生全膏肓骨髓視之瞭然慨夫晚近風氣浸薄冬不潛陽雷電間作未春先榮未秋先落根淺干柔花嬌實剝其在於人質鮮古朴朝夕營營聲色利貸仁厚少存神氣蕭索夭折匪天本根先斷我心鑑此遊藝醫林會以儒理出以佛心參形合數援古症今七方十劑運用時欽究慚淺學是用規針本願五則一拙性耽間散且有希夷先生之癖時或懶於酬應故不敢懸壺以完吾璞一診病必詳問病因參以色脈務得其表裡虛實不敢少存率略一立方不拘大小奇偶必法古而不滯於古務期當理中病一用藥不取隱僻奇異之品用引不過藉以引經不學時習多選新奇希貴之物以標異邀名作難文過一病有萬變治亦有萬變非具聖明之質不能盡徹其微豫或心有疑似即使就正明哲不敢苟且誤人不治五則一貪欲無度怪僻反常者不治一有挾自任輕醫試藥者不治一病家亂雜疑忌多端者不治一家人怨詈與病人違忤者不治一不守醫戒陽奉陰違者不治凡此五者皆由人作苟自知所病不治亦治明者鑑之
