body:
  text: 引言嘗聞古之醫者識天時知氣運通四診之精微熟諸經之奇正洞見垣一方人神乎伎矣故自靈素傳書難經發難其文淵深古奧義理無不包括誠為金匱之祕册壽民之實録後人得其一二意旨遂以名家但其書有論無方特示人以大經大法令心領而神悟惟針灸之治語焉必詳以針灸有定穴不得不辨明經絡指示榮俞使後之業此者得按經而取穴也以是知古聖人贊化調元躋生民於壽域何其用心之細而立法之密歟夫針灸由來久矣靈樞為針灸之宗本自後明醫輩出殆且百家如扁鵲倉公張機元化以及東垣河間丹溪諸賢此皆名之最著者無不各有著述發明先聖之經義秦漢而下代有傳人至明有越人張會卿集諸家之要旨著為類經而針灸之學益顯然猶有未盡者惟我國朝纂宗鑑一書為醫林之總彙如衆水之歸宗其言針灸審穴分寸的無差謬誠哉卓越千古惜近世醫流學焉者寡治針者百無一二治灸者十無二三惟湯液之治比比皆然是豈湯液易而針灸難歟非也凡人受天地之氣以生莫不具有經絡臟腑其中病也或在經在絡入腑入臟則必待明經絡臟腑者方可以去病豈為湯液者可舍經絡臟腑而別為治乎吾知必無是理也然則何為治此者多而習彼者寡蓋以湯液之治易於藏拙其用柔而取效可緩即彼讀湯頭記本草者遂可以醫名若夫針灸之治苟不明經絡俞穴無從下手且其用剛而得失易見人之不樂為此而樂為彼者由此故也不知針灸湯液其為用不同而為醫則一也獨是用針之要先重手法手法不調不可以言針灸法亦與針並重而其要在審穴審得其穴立可起死回生所以古人合而言之分而用之務期於中病而已矣是編置針言灸非以針難而灸易以針之手法未可以言傳灸之穴法尚可以度識也苟能精意講求由灸而知針由針而知道紹先聖之淵源補湯液所不及其功效豈淺鮮哉爰命孫雲路草訂成編以為家藏備要云爾時咸豐元年歲次辛亥仲秋月古歙吳亦鼎硯丞氏自志
