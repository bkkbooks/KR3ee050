body:
  text: 卷之一説原粵稽古昔療民疾病有醫藥而無方書素問辨症論治經絡詳明靈樞多言針灸溫涼補瀉法密而用神自秦漢以下方書出而針灸之治鮮有傳人原針有九視病之輕重虛實用以手法刺淺刺深呼吸運動之間須要醫者與病人息息相通方能愈病非神而明之者莫能窺其奧旨灸法要在明症審穴症不明則無以知其病之在陽在陰穴不審則多有誤於傷氣傷血必精心體究然後可收灸治之全功而見愈病之神速也凡人之血氣精神所以奉生而周於性命者也氣有阻逆則陽脈不和而神無所守血有凝滯則陰脈不和而精日有虧內傷於七情外感於六氣皆足為氣血病灸者溫暖經絡宣通氣血使逆者得順滯者得行誠前聖之妙用而惠人於無窮也且有風寒卒中危在須臾用藥有所不及灸得其要立可回生醫家取效見功莫過於此者後人難在取穴遂與針法並廢而不究心至病有可生而無生之之法任其枉死良可悲也夫灸取於火以火性熱而至速體柔而用剛能消陰翳走而不守善人臟腑取艾之辛香作炷能通十二經入三陰理氣血以治百病效如反掌學者不可不知也蓄艾凡物多用新鮮惟艾取陳久者良以艾性純陽新者氣味辛烈用以灸病恐傷血脈故必隨時收蓄風乾淨去塵垢搗成熟艾待三年之後燥氣解性溫和方可取用用時復以手細揉堅團作炷或大或小臨症隨宜酌用庶無有誤下火灸法下火宜用陽燧火珠承日取太陽之火其次用線香火或麻油燈蠟燭火以艾莖燒點於炷艾潤灸瘡至愈不痛也其戛金擊石鑽燧入木之火皆不可用邵子云火無體因物以為體金石火傷神多汗桑火傷肌肉柘火傷氣脈棗火傷肉吐血橘火傷營衛經絡榆火傷骨失志竹火傷筋損目南齊書載武帝時有沙門從北齊齎赤火來其火赤於常火而小云以療疾貴賤爭取之灸至七炷多驗吳與楊道慶虛疾二十年灸之即瘥咸稱為聖火詔禁之不止不知此火何物之火也故灸病下火最宜選慎若急卒驚惶取用竹木之火非徒無益而反有損人以為灸無功效而不知用火之過誤也坐向古法灸病令病人春坐東向西夏坐南向北秋坐西向東冬坐北向南後八易要春向東夏向南秋向西冬向北順迎四時之生氣理為近似然準此為定向盡人所同但人各有定命各有五行生剋制化不若遵憲書九宮男女定命坐旺迎生為準的如一宮立命乾兌為生坎為旺坐坎向乾或向兌皆為生旺互用二宮立命離為生坤艮為旺三四兩宮立命坎為生震巽為旺五宮立命男寄於艮女寄於坤生旺與二八兩宮同六七兩宮立命坤艮為生乾兌為旺八宮立命生旺同二宮九宮立命坤艮為生離為旺照此安定坐向灸之乃有神驗點穴分寸千金云人有老少體有長短膚有肥瘦皆須精思度量準而折之法以男左手女右手以中指第二節屈指兩紋尖相去為一寸童稚亦如之取稻杆心量或薄篾量皆易折而不伸或以細繩蠟用亦可凡點穴皆要平正四體無使歪斜灸時恐穴不正徒壞好肉爾若坐點則坐灸臥點則臥灸立點則立灸反此則不得真穴矣早晚次序天有陰陽日分晝夜陽生於子而盡於午陰生於午而盡於子人身之陰陽亦與之應故灸法從陽必取陽旺之時以正午下火為最善正時既得次第須分如上下皆灸先灸上後灸下陰陽經皆灸先灸陽後灸陰若顛倒錯亂則輕者重淺者深致多變症灸病吉日丁卯庚午甲戌丙子丁丑壬午甲申丙戌丁亥辛卯壬辰丙申戊戌己亥庚子辛丑甲辰乙巳丙午戊申壬子癸丑乙卯丙辰己未壬戌成日開日執日天醫日忌辛未扁鵲死日男忌除日女忌破日四季人神所在禁忌神常在心春在左脅秋在右脅冬在腰夏在臍逐日人神所在初一日足大指初二日外踝初三日股內初四日在腰初五日在口初六日在小手小指初七日在內踝初八日在腕初九日在尻初十日在背腰十一日鼻柱十二日髮際十三日在牙十四日在胃十五日遍身十六日在胸十七日氣衝十八日股內十九日在足二十日內踝二十一日手小指二十二日外踝二十三日在肝二十四日手陽明二十五日在足二十六日在胸二十七日在膝二十八日陰中二十九日在脛三十日在趺十二時人神所在子在左右內外踝醜在頭寅在耳卯在面辰在項巳在乳肩午在脅未在腹申在心主酉在膝戌在腰背亥在股灸炷大小多寡生人體質有強弱虛實皮肉有厚薄堅柔不可不分別灸之如頭與四肢肌肉淺薄若並灸之恐肢骨氣血難堪必分日灸之或隔日灸之其炷宜小壯數亦不宜多背腹皮肉深厚艾炷宜大壯壯數宜多使火氣充足始能去痼冷疾也有病必當灸巨闕鳩尾二穴者必不可過三壯艾炷如小麥恐火氣傷心也古人灸法有二報三報以至連年不絶者前後相催其效尤速或自三壯五壯以至百壯者由漸而增多多益善也灸忌灸病必先候脈辨症脈得數實症見躁煩口乾咽痛面赤火盛新得汗後以及陰虛內熱等症俱不宜灸臂腳穴灸多脫人真氣令人血脈枯竭四肢削瘦無力人有病欲灸足三里者必年三十以上方許灸之恐年少火盛傷目故凡灸頭必灸足三里者以足三里能下火氣也陰晦大風雷雨並人神所在忌日皆不宜灸然有病當急遽之時又宜權變補瀉凡用火補者勿吹其火必待其從容徹底自滅灸畢即可用膏貼之以養火氣若欲報者直待報畢貼之可也用火瀉者疾吹其火令火速滅須待灸瘡潰發然後貼膏此補瀉之法也灸瘡七日不發是氣血衰敗症不可治灸後調養灸後氣血宣通必須避風寒節飲食慎起居戒惱怒平心靜氣以養正祛邪壽世青編有五養説可以卻病延年一在養心心者萬法之宗一身之主生死之本善惡之源與天地相通為神明之主宰而病否之所由系也蓋一念萌動於中六識流轉於外不趨乎善則五內顛倒大疾纏身若夫達士則不然一心澄湛萬禍消除老子曰夫神好清而心擾之人心好靜而欲牽之常能遺其欲而心自靜澄其心而神自清自然六欲不生三毒消滅孟子曰養心莫善於寡欲所以妄想成病神仙莫醫正心之人鬼神亦憚養與不養故也目無妄視耳無妄聽口無妄言心無妄動貪嗔癡愛是非人我一切放下未事不可先迎遇事不宜過擾既事不可留住聽其來去應以自然忿懥恐懼好樂憂患皆得其正此養心之法也一在養肝肝者魂之處也其竅在目其位在震主春生髮動之令也然木能動風故經曰諸風掉眩皆屬於肝又曰陽氣者煩勞則張精絶闢積於夏使人煎厥春氣方升而煩勞太過則氣張於外精絶於內春令邪辟之氣積久不散至夏則火旺而真陰如煎火炎而虛氣逆上故曰煎厥又曰肝氣失治善怒者名曰煎厥戒怒養陽使生生之氣相生於無窮又曰大怒則形氣絶而血菀於上使人薄厥菀結也怒氣傷肝肝為血海怒則氣上氣逆則絶所以血菀上焦相迫曰薄氣逆曰厥氣血俱亂故為薄厥積於上勢必厥而吐也薄厥者氣血之多而盛者也所以肝藏血和則體澤衰則枯稿故養肝之要在於戒忿怒是攝生之第一法也一在養脾脾者後天之本人身之倉廩也脾應中宮之土土為萬物之母如嬰兒初生一日不再食則飢七日不食則腸胃涸絶而死經曰安穀則昌絶谷則亡蓋穀氣入胃漉陳六腑而氣至和調五臟而血生人之所資以為本者也然土惡濕而喜燥飲不可過過則濕重而不健食不可過過則壅滯而難化病由是生矣故飲食所以養生而食無厭亦能害生物理論曰穀氣勝元氣其人肥而不壽養生之術常令穀食氣少則病不生穀氣且然矧五味饜飫為五內害乎甚而廣搜珍錯爭尚新奇恐其性味良毒與人臟腑宜忌尤未可曉故西方大法使人戒殺茹素本無異道人能戒殺則性慈而善念舉茹素則心清而腸胃厚無嗔無貪邪淫不犯此養脾在於節食不可不知一在養肺肺者臟之長也心之華蓋也其藏魄其主氣統領一身之氣者也經曰有所失亡所求不得則發肺鳴鳴則肺熱葉焦充之則耐寒暑傷之則百邪易侵隨事痿矣故怒則氣上喜則氣緩悲則氣消恐則氣下驚則氣亂勞則氣耗思則氣結七情之害皆氣主之也直養無害而後得其浩然之正與天地相通與道義相配先王以至日閉關養其微也慎言語節飲食防其耗也氣之消息大矣哉一在養腎腎者先天之本藏精與志之宅也仙經曰借問如何是元牝嬰兒初生先兩腎又曰元牝之門是為天地根是故人未有此身先生兩腎蓋嬰兒未成先結胞胎其象中空一莖透起形如蓮蕊一莖即臍帶也蓮蕊即兩腎也為五臟六腑之本十二脈之根呼吸之主三焦之原人資以為始豈非天地之根乎而命寓焉者故又曰命門天一生水故曰坎水夫人欲念一起熾若炎火水火相剋則水熱火寒而靈臺之焰藉此以滅矣使水先枯涸而木無所養則肝病火炎則土燥而脾敗脾敗則肺金無資咳嗽之症成矣所謂五行受傷大本已去欲求長生豈可得乎莊子曰人之大可畏者不知所戒也養生之要首先寡欲嗟乎元氣有限情欲無窮內經曰以酒為漿以欲為常醉以入房以竭其精此當戒也然人之有欲如木之有蠹蠹甚則木折欲熾則身亡仙經曰無勞爾神無搖爾精無使爾思慮營營可以長生智者鑑之臥時祝法經云夜寢欲閣眼以手撫心三過微祝曰太靈九宮太乙守房百神安位魂魄和同長生不死塞滅邪凶祝畢而寢此名九宮隱祝寢魂之法常能行之使人魂魄安然永獲貞吉治虛癆咒孫真人云人病虛癆陰虛火旺易生忿怒莫能自制崑崙大隱仙師有滅火咒曰上天下地有我一身生氣運動耳目聰明神失氣散冥冥一心富貴安在妻拿匪親為榮為辱任人旦評我今現在有喜無嗔靈臺仙子玉闕真君祛我煩惱助我精神真丹內結淨掃六塵默誦數遍五臟自覺清虛內火平熄久久誦之虛者實弱者強病可不治而愈用艾凡下艾時必先以蒜切片擦穴上然後安艾不然則運動之間其艾必落矣如著艾火痛不可忍預先以手指緊罩其穴處更以鐵物壓之即止或著火有眩暈者神氣虛也仍以冷物壓灸處其暈自蘇再停良久以稀粥或薑湯與飲之以壯其神復如前法以終其事灸瘡候發灸法以陽勝陰著艾火後須要瘡發所患即瘥若見灸瘡不發用故鞋底焙熱尉之三日而發仍以小雞鰱魚豆腐等物與食其瘡必發若氣血衰弱者調之以藥餌又灸後瘡未發宜烏桕樹葉貼之瘡發痛不止用柏葉芙蓉葉端午日午時採陰乾為細末每遇灸瘡黑蓋平脫水調少許如膏著紙貼之即愈若灸瘡出血用百草霜為末摻之即止又洗法以蔥葉薄荷煎水溫洗可逐風邪若瘡發黑爛疼痛用桃枝柳枝胡荽黃連煎水溫洗總之灸後瘡發病易已瘡不發病難已以人之元氣勝與不勝也灸瘡膏藥方用黃芩黃連白芷金星草乳香當歸薄荷淡竹葉川芎蔥白鉛粉香麻油以上藥味各等分用香油煎藥去渣再下鉛粉熬成膏專貼灸瘡十二經循行經絡手太陰肺肺手太陰之脈起於中焦下絡大腸還循胃口上膈屬肺從肺系橫出腋下下循臑內行少陰心主之前下肘中循臂內上骨下廉入寸口上魚循魚際出大指之端其支者從腕後直出次指內廉出其端手陽明大腸大腸手陽明之脈起於大指次指之端循指上廉出合谷兩骨之間上入兩筋之中循臂上廉入肘外廉上臑外前廉上肩出髃骨之前廉上出於柱骨之會上下入缺盆絡肺下膈屬大腸其支者從缺盆上頭貫頰入下齒中還出挾口交人中左之右右之左上挾鼻孔足陽明胃胃足陽明之脈起於鼻之交頞中旁約太陽之脈下循鼻外上入齒中還出挾口環唇下交承漿卻循頤後下廉出大迎循頰車上耳前過客主人循髮際至額顱其支者從大迎前下人迎循喉嚨