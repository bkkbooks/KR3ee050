脈上耳前筋結耳前膽脈三焦脈俱走耳前筋從耳前屬目小腸膀胱筋俱結耳後完骨胃脈之支膽脈三焦脈俱過耳後頰耳前顴側面兩旁之稱也大腸筋脈俱上頰小腸脈上頰胃筋循頰而上膽筋脈俱過頰肝脈下頰三焦當曲頰脈亦交頰胃頰車穴在耳下分曲頰頰之骨也曲如環形受頰車骨尾之鉤者也頰車下牙床骨也總載諸齒能咀食物故名頰車口司言食之竅也屬脾胃大腸脈交口畢竟脾為主蓋味入口藏於胃脾乃運化精液以養五臟故五臟之氣皆統於脾五臟偏盛皆驗於口唇口端也肝脾胃三經所主熱則紅甚寒則淡紅實則紅活虛則黃白脾燥唇乾脾熱唇裂肝風唇瞤動不止脾寒唇青或揭七情動火傷血或心火傳脾或厚味積傷脾唇腫白皮皺裂如蠶繭或唇下腫如黑棗吻口之四周也口上有髭大腸主之頤口角後顑之下也頤上有須膽主之頦口之下唇至末之處俗名下把殼頦上有髯胃主之頷頦下結喉上兩側肉之空軟處也小腸筋結頷膽筋脈俱過頷齒口齦所生之骨也內床曰齒外板曰牙牙齒腎之標齒病宜歸腎而治齒先分病在牙床病在牙齒上床屬胃喜寒惡熱下床屬大腸喜熱惡寒床病治齒齒病治床諸不應舌舌為心苗司味之竅也脾腎膀胱三焦筋脈所繫舌本舌之根也頏顙口內之上二孔司分氣之竅也懸壅垂張口視喉上似乳頭之小舌俗名碓嘴喉通聲息之路也在咽前通肺主出氣故曰肺系又曰喉氣通天肺熱甚喉啞胃腎二脈循喉咽飲食之路也在喉後通胃主納食胃口在膈膜下咽至胃長一尺六寸通謂之咽門咽門下有膈膜咽氣通地心脾二脈挾咽令咽乾肝脈循喉後令咽乾喉嚨肺之系也嗌胃之系也咽之低處曰嗌小腸脈循咽令嗌痛三焦脈由喉令嗌腫會厭覆喉管之上竅似皮似膜上司開闔為聲音之戶食下咽不掩則錯凡舌抵上齶則會厭能掩喉喉咽嗌會厭四者缺一則飲食廢而死結喉喉之管頭也其人瘦者多外見頸前肥人則隱於肉內多不見也上橫骨在喉前宛宛中天突穴之外小灣橫骨旁接拄骨之骨拄骨膺上缺盆之外俗名骨鎖子骨內接橫骨外接肩解肩解肩端之骨節解處也髃骨肩端之骨也即肩胛骨頭臼之上稜骨也其臼接臑骨上端俗曰肩頭其外曲捲翅骨肩後之稜骨也其下稜骨在背肉內肩胛即髃骨之末成片骨也亦名肩膊俗名鍁板子骨大小腸三焦筋脈俱至肩膽脈至肩上肩井穴屬膽膀胱筋肺筋皆結肩髃臂上身兩大支之通稱也一名曰肱俗名胳膊胳膊中節上下骨交接處名曰肘肘上之骨曰臑骨肘下之骨曰臂骨臂有正輔二骨輔骨在上短細偏外正骨居下長大偏內俱下接腕骨也腕臂掌骨接交處以其宛屈故名也當外側之骨名曰高骨一名鋭骨亦名踝骨魚在掌外側之上大指節後肥魚隴起處其形如魚故謂之魚手手者上體所以持物也掌中為手心手之表為手背掌骨手衆指之本也掌之衆骨名壅骨合湊成掌非塊然一骨也手大指屬肺肺脈自腋入臑至大指出其端肺筋即起於大指端少商穴之次穴在大指內側去爪甲如韭葉循手掌直上大指本節後有魚際穴為肺榮掌後橫紋頭有太淵穴為肺腧太淵後有經渠穴為肺經手腕後一寸五分有列缺穴為肺絡臂腕曲中有尺澤穴為肺合循內側上臑入腋其散筋復自腋上肩結於肩端骨罅中食指屬大腸大腸筋脈皆起於食指端商陽穴之次穴去爪甲如韭葉為大腸井溜於本節前內側名二間穴為大腸滎注於本節後三間穴為大腸腧過於合谷穴為大腸原上側腕中有陽溪穴為大腸經腕後三寸有偏歷穴為大腸絡肘曲紋頭盡處有曲池穴為大腸合由是歷三里肘髎五里三穴直上結於肩之前髃中指屬包絡包絡之脈自腑循臑入肘臂至中指出其端其筋即起於中指內廉之末中衝穴之次穴去爪甲如韭葉為心之井心為天君其井腧等俱在包絡屈中指無名指兩者之間取勞宮穴為心榮掌後兩筋之間有大陵穴為心腧去腕二寸兩筋間有內關穴為心主之絡去腕三寸有間使穴為心經上至肘曲中央陷中有曲澤穴為心合上循天泉穴之次結腋下無名指屬三焦三焦筋脈俱起無名指外廉關衝穴之次穴去爪甲如韭葉為三焦井溜於小指次指本節陷中名液門穴為三焦榮注於腑下一寸名中渚穴為三焦腧結於手腕中之陽池穴為三焦原直上腕後二寸名外關穴為三焦絡腕後三寸名支溝穴為三焦經結於肘外大骨陷中名天井穴為三焦合上臑至肩髎穴包絡脈之支別掌中循無名指出其端小指內側屬心外側屬小腸心脈循臑下肘出小指之端心筋起小指之端內側少衝穴之次穴去爪甲如韭葉直上入掌內後廉歷神門穴在掌後鋭骨中又歷通里穴為心絡在腕後一寸陷中又歷少海穴在肘後大骨外去肘端五分屈肘向頭得之又歷極泉穴在臂內腑下筋間小腸筋脈俱起小指外側少澤穴之次穴去爪甲一分為小腸井溜於小指外側本節前陷中名前谷穴為小腸滎注於小指外側本節後名後溪穴為小腸腧直上至於脘起骨陷中有腕骨穴為小腸原踝下有陽谷穴為小腸經腕後五寸有支正穴為小腸絡肘下鋭骨之後有小海穴為小腸合從是上臑歷肩解肩胛交肩上爪甲指之甲也足趾同肝主筋爪者筋之餘岐骨凡骨之兩叉者皆名岐骨手足同肺喉下為肺喉在咽前主出氣喉系堅空連接肺管呼吸出入下通心肝之竅經云肺者相傅之官治節出焉其形四垂附著於脊之第三椎中有二十四空行列分布以行諸藏之氣為藏之長為心之蓋又曰是經常多氣少血難經曰肺重三斤三兩六葉兩耳凡八葉主藏魂中藏經曰肺為生氣之原乃五臟之華蓋張介賓曰肺葉白瑩謂為華蓋以覆諸藏虛如蜂窠下無透竅吸之則滿呼之則虛一呼一吸消息自然司清濁之運化為人身之槖籥膺胸上兩旁高處曰膺胃脈到膺膽脈系膺胸結喉下曰缺盆缺盆下曰胸在膺之下肺脈布胸中肺心筋結胸中脾筋脈皆散胸中肝脈上至胸膽脈下胸中腎脈入肺注胸中包絡脈起胸中筋散胸中心心者君主之官神明出焉又云心居肺管之下膈膜之上附著脊之第五椎其合脈也其榮色也開竅於耳又曰開竅於舌又曰是經少血少氣難經曰心重十二兩有七孔三毛盛精汁三合主藏神張介賓曰心臟尖圓形如蓮蕊其中有孔多寡不同以導引天真之氣下無透竅上通乎舌共有四系以通四髒心外有黃赤脂裹是為心包絡心下有膈膜與脊周回相著遮蔽濁氣使不得上熏心肺所謂膻中也心包位居心之四旁以捧護心即兩孔之中膻中穴也凡筋脈由胸下膈自膈貫胸如肺心脾肝膽腎心包絡七經筋脈皆從此過三焦脈亦布膻中張介賓曰心包一臟難經言其無形滑壽曰心包一名手心主以藏象校之在心下橫膜之上豎膜之下其與橫膜相黏而黃脂裹者心也脂𫆳之外有細筋膜如絲與心肺相連者心包也此説為是凡言無形者非靈蘭祕典論有十二官獨少心包一官而有膻中者臣使之官喜樂出焉二句今考心包藏居膈上經始胸中正值膻中之所位居相火代君行事實臣使也此一官即此經之謂與𩩲骭胸之衆骨名也乳膺上突起兩肉有頭婦人以乳兒者也乳房屬胃乳頭屬肝鳩尾即蔽心骨也其質系脆骨在胸之下岐骨之間膈胸下腹上之界人心下有膈膜前齊鳩尾後齊十一椎周圍著脊所以遮隔濁氣俗名羅膈十二經脈惟膀胱脈不貫膈余皆能令膈痛肝經云肝者將軍之官謀慮出焉又云肝居膈下上著脊之九椎下是經常多血少氣其合筋也其榮爪也主藏魂開竅於目其繫上絡心肺下無竅難經曰肝重二斤四兩左三葉右四葉凡七葉肝之為藏其治在左其藏在右脅右腎之前並胃著脊之第九椎膽經云膽者中正之官決斷出焉又云是經多血少氣又曰凡十一藏皆取決於膽也難經曰膽在肝之短葉間重三兩三銖長三寸盛精汁三閣中藏經曰膽者清淨之府號曰將軍主藏而不瀉膽寒不眠膽熱喜睡脾經云脾胃者倉廩之官五味出焉又云諫議之官知周出焉又云脾藏意又云形如刀鐮與胃同膜而附其上之左腧當十二椎下聞聲則動動則磨胃而主運化其合肉也其榮唇也開竅於口又云是經常多氣少血難經曰脾重二斤三兩廣扁三寸長五寸有散膏半斤主裹血溫五臟中臟經曰脾主消磨五穀養於四旁胃胃者水穀之海五臟六腑之大原故胃氣為一身之本咽系柔空下接胃為飲食之路咽至胃長一尺六寸通曰咽門胃大一尺五寸徑五寸長二尺六寸橫屈受水穀三斗五升常留谷二斗水一斗五升而滿又云是經多氣多血難經曰胃重二斤一兩張介賓曰胃之上口名曰賁門飲食之精氣從此上輸於脾肺宣布於諸脈胃之下口即小腸上口名曰幽門三焦經云上焦如霧中焦如漚下焦如潰又云三焦者決瀆之官水道出焉又云是經少血多氣中藏經云三焦者人之三元之氣也號曰中清之府總領五臟六腑營衛經絡內外左右上下之氣也三焦通則內外上下左右皆通也其於周身灌體和內調外榮左養右導上宣下莫大於此也腹膈之下曰腹俗名曰肚臍之下曰少腹亦名小腹臍人之初生胞蒂之處也臍上五寸上脘穴分即上焦臍上四寸為中脘即中焦肺脈起中焦在此臍上二寸為下脘即胃下口屬下焦是為幽門傳入小腸舊説分三部正分此上中下三脘今乃曰中脘痛屬脾當臍痛屬腎小腹痛屬肝肝脾是矣當臍何以屬腎心脾筋結臍胃筋脈挾臍當臍明屬脾胃若腎之筋脈從腰貫脊並不及臍臍痛治腎舛謬誤人腎經云腎者作強之官伎巧出焉又云腎附於脊之十四椎下是經常少血多氣其合骨也其榮發也開竅於二陰難經曰腎有兩枚重一斤二兩主藏精與志中藏經曰腎者精神之舍性命之根張介賓云腎有兩枚形如豇豆相併而曲附於脊之兩旁相去各一寸五分外有黃脂包里各有帶二條上條繫於心下條趨脊下大骨在脊骨之端如半手許中有二穴是腎帶經過處上行脊髓至腦中連於髓海命門人身之中有命門附脊骨對臍其右旁一小竅乃三焦之氣所自出即先天無形之火曰腎間動氣左旁一小竅乃真陰水氣所自出亦無形隨相火而潛行周身以榮四末命門居中各開一寸五分分左右腎兩腎中間一點真陽乃生身之根蒂中有相火代心君行事故又曰小心小腸經云小腸者受盛之官化物出焉又云小腸後附於脊前附於臍上左回纍積十六曲大二寸半徑八分分之少半長三丈二尺受谷二斗四升水六升三合合之大半又云小腸上口在臍上二寸近脊水穀由此而入復下一寸外附於臍為水分穴當小腸下口至是而泌別清濁水液滲入膀胱滓穢流入大腸又云是經多血少氣難經曰小腸重三斤十四兩大腸經云大腸者傳道之官變化出焉又云回腸當臍左回十六曲大四寸徑一寸半長二丈一尺受谷一斗水七升半又云廣腸附脊以受回腸乃出滓穢之路大八寸徑二寸半長二尺八寸受谷九升三合八分合之一是經多氣少血難經曰大腸重二斤十二兩肛門重十二兩張介賓曰按回腸者以其回疊也廣腸者即回腸之更大者直腸者又廣腸之末節下連肛門也膀胱經云膀胱者州都之官津液藏焉氣化則能出矣又云膀胱當十九椎居腎之下大腸之前有下口無上口當臍上一寸水分穴處為小腸下口乃膀胱上際水液由此別回腸隨氣泌滲而入其出入皆由氣化入氣不化則水歸大腸而為泄瀉出氣不化則閉塞下竅而為癃腫是經多血少氣難經曰膀胱重九兩二銖縱廣九寸盛溺九升九合口廣二寸半宗筋肝筋脈結陰器絡諸筋脾胃筋聚陰器腎筋結陰器溺孔即前陰督脈起處毛際宗筋上小腹下橫骨間叢毛之際也下橫骨俗名蓋骨任脈由會陰上毛際衝脈起於氣街即氣衝陽明經穴在毛際兩旁陽明血氣盛毛美而長氣血少則無毛肝筋脈入毛際膽脈繞毛際睪丸男子外腎宗筋下陰囊中兩丸也篡橫骨之下兩股之前相合共結之凹也前後兩陰之間名下極穴又名屏翳穴會陰穴即男女陰氣之所也腦後骨俗呼腦杓枕骨腦後骨之下隴起者是也其骨或稜或平或長或圓不一完骨耳後之稜骨名曰完骨在枕骨下兩旁之稜骨也頸項頸之莖也又曰頸者莖之側也項者莖之後也俗名脖項頸前有缺盆穴屬胃在橫骨上左右各一為十二經道路大小腸胃膽三焦脈俱入缺盆肺胃膽膀胱筋俱結缺盆缺盆之中即任脈之天突穴為頸前居中第一行脈缺盆之上有人迎穴喉間開一寸五分屬胃即頸前第二行脈人迎後一寸五分名扶突穴屬大腸即頸中第三行脈扶突穴後名天窗屬小腸即頸中第四行脈天窗後為膽脈頸中無穴乃第五行脈足少陽後名天牖穴屬三焦即頸中第六行脈天牖後名天柱穴屬膀胱為頸中第七行脈頸之中央督脈也穴名風府自前中一行至此為第八行頸骨頭之莖骨肩骨上際之骨俗名天柱骨也項骨頭後莖骨之上三節圓骨也背後身大椎以下腰以上之通稱也脊骨脊膂骨也俗名脊梁骨督脈主脊大腸脈挾脊心脈與脊裡細脈相連貫脾筋著脊腎筋脈貫脊膀胱筋脈挾脊分左右上項其分左右也從脊開寸五分為第二行對第三椎曰肺俞對第五椎曰心俞對第七椎曰膈俞對第九椎曰肝俞對第十椎曰膽俞對第十一椎曰脾俞對第十二椎曰胃俞對第十三椎曰三焦俞對第十四椎曰腎愈對第十六椎曰大腸俞對第十八椎曰小腸俞對第十九椎曰膀胱俞從脊開三寸為第三行魄門對肺俞故肺藏魄神堂對心俞故心藏神魂門對肝俞故肝藏魂意舍對脾俞故脾藏意志舍對腎俞故腎藏志膏肓對第四椎膂夾脊骨兩旁肉也膀胱脈腎脈循膂腋肩之下脅之上際俗名胳肢窩肺筋脈入腋心小腸筋結腋膽筋走腋包絡脈抵腋脅肋脅者腑下至肋骨盡處之統名也曰肋者脅之單條骨之謂也總脅肋之總又名曰胠肝膽脈布脅胞絡筋脈挾脅脾筋結肋肝脈布肋季脅脅之下小肋骨也俗名軟肋肺脈抵季脅膽筋脈乘季脅䏚脅下無肋骨空軟處也膽脈乘䏚腰骨即脊骨十四椎下十五十六椎間尻上之骨也其形中凹上寬下窄方圓二三寸許兩旁四孔下接尻骨上際腎脈入腰膀胱脈抵腰胂腰下兩旁踝骨上之肉也臀胂下尻旁大肉也膀胱脈貫臀筋結於臀尻腰骨下十七椎至二十一椎五節之骨也上四節紋之旁左右各四孔骨形內凹如瓦長四五寸許上寬下窄末節更小如人參蘆名尾閭一名骶端一名橛骨一名窮骨在肛門後其骨上外兩旁形如馬蹄附著兩踝骨上端俗名胯骨膽筋結於尻肛大腸下口也肛門接直腸直腸接大腸大腸與肺為表裡肺氣充足方能傳送下橫骨髁骨楗骨下橫骨在少腹下其形如蓋故名蓋骨其骨左右兩大孔上兩分出向後之骨首如張扇下寸許附著於尻骨之上形如馬蹄之處名曰髁骨下兩分出向前之骨末如楗柱在於臀內名曰楗骨與尻骨成鼎足之勢為坐之主骨也婦人俗名交骨其骨面名曰髖俠髖之臼名曰機又名髀樞外接股之髀骨也即環跳穴處此一處五名也股下身兩大支之通稱也俗名大腿小腿中節上下交接處名曰膝膝上之骨曰髀骨股之大骨也膝下之骨曰胻骨脛之大骨也股肉屬脾筋屬肝骨屬腎陰股股之內側曰陰股脾肝腎筋脈俱循陰股髀骨膝上之大骨也上端如杵接於髀樞下端如錘接於胻骨胻骨俗名臁脛骨也其骨兩根在前者名成骨又名骭骨形粗膝外突出之骨也在後者名輔骨形細膝內側之小骨也伏兔髀骨前膝之上起肉似伏兔故名膝解膝之節解也膝屬脾腎肝凡人逸則痿軟無力勞則痛如針刺脈洪數有力皆肝腎陰虛火盛所致痿軟無力真病之形作痛如錐邪火之象臏骨膝上蓋骨也連骸膝外側二高骨也膕膝後屈處俗名腿凹腨下腿肚也一名腓腸俗名小腿肚屬足太陽膀胱踝骨踝者胻骨之下足附之上兩旁突出之高骨在外為外踝在內為內踝足下體所以趨步也俗名腳跗骨足背也一名足趺俗稱腳面跗骨者足趾本節之衆骨也足心即踵之中也跟骨足後跟之骨也三毛足大指爪甲後為三毛毛後橫紋為聚毛踵足下面著於地之謂也俗名腳底板足趾趾者足之指也其數五名為趾者別於手也大趾之本節後內側圓骨形突者名核骨足大指外側屬肝內側屬脾脾筋脈皆起於足大指隱白穴為脾井溜於節後陷中大都穴為脾滎注於內側核骨下太白穴為脾俞循大指本節後一寸公孫穴為脾絡歷內踝前三分陷中商邱穴為脾經由足循經骨後結於膝內輔骨陷中陰陵泉之次為脾合從此直上至陰股結於髀箕門穴之次臀下曰髀肝筋脈皆起於足大指外側叢毛之際大敦穴為肝井溜於大指縫中行間穴為肝滎行跗上注於本節後二寸動脈中太衝穴為肝俞結於內踝前一寸中封穴之次為肝經循踝上五寸蠡溝穴為肝絡直上內輔骨下橫紋盡處曲泉穴為肝合上陰股五里陰廉之次舊説足中指屬胃胃筋起於中指內側厲兌穴為胃井溜於次指外側陷中內庭穴為胃滎注於內庭後二寸陷谷穴為胃俞過於跗上去內庭五寸衝陽穴為胃原故胃病足跗腫痛足中指不用自足跗直上循足脛歷腕上系草鞋處解溪穴為胃經又歷外踝上八寸豐隆穴為胃絡結於膝下三寸三里穴為胃合上膝循伏兔結於髀髀前膝上起肉處為伏兔後為髀關其脈自伏兔直下抵足跗入中指內間其支者別跗上入大指間出其端按足陽明是足大指之次指不是中指必傳寫之誤胃脈起於鼻之交頞中下行至陷谷陷谷穴在足大指次指間本節後陷中內庭穴在足大指次指外間陷中厲兌穴在足大指次指之端去爪甲如韭葉三穴明是次指與中指不屬以是知中字之誤然則中指何屬經云其支者下膝三寸而別以下入中指外間此支自膝下三寸循三里穴之外別行而下入中指外間與前之內庭厲兌合是中指亦屬胃也足四指屬膽膽筋起足四指外端竅陰穴之次為膽井指岐骨間有俠雞穴為膽榮俠雞上寸半有臨泣穴為膽俞俠溪上四寸五分有邱墟穴為膽原外踝上四寸陽輔穴為膽經外踝上五寸光明穴為膽絡循脛至膝外廉下膝一寸陽陵泉穴為膽合從是上走髀分為兩岐前者結伏兔後者結於尻直者上季脅其脈自髀陽直下出膝外廉循脛抵外踝至足跗入第四指之間其支者別跗上入大指貫爪甲後三毛故足少陽血氣盛脛毛長外踝肥血氣少脛無毛外踝瘦病則膝脛外踝及大節諸節皆痛足小指指下屬腎外側屬膀胱腎筋脈俱起小指之下斜趨足心湧泉穴為腎井又側趨內側內踝前一寸大骨下有然谷穴為腎滎結於跟踵踵即跟之突出者跟即踵上硬筋處陷中有大溪穴為腎俞自跟別至跟後踵中大骨上兩筋間有大鐘穴為腎絡踝上二寸復溜穴為腎經上腨出膕內廉結於內輔骨下陰谷穴之次為腎合從是並大陰之筋上循陰股膀胱筋起小指外側去爪甲一分至陰穴之次為膀胱井曆本節之前陷中有通谷穴為膀胱滎本節之後陷中有束骨穴為膀胱俞外側大骨之下有京骨穴為膀胱原外踝後骨跟上有崑崙穴為膀胱經循跟直上至外踝上七寸有飛陽穴為膀胱絡貫腨結於膕膕即委中在膝脘內約紋中為膀胱合由膕直上結於臀其脈從腰抵膕出小指外側故膀胱病膕似結腨如裂足小指不能舉用
